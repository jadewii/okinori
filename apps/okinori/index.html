          ['transpose-mode','🎹'], // Toggle between keys and grid
          ['octave-down','-'],
          ['octave-up','+']
        ];

        moduleTabsSticky.innerHTML = '';

        function exitPatternMode() {
          patternMode = 'normal';
          syncGlobalMode();
          sourcePresetForDup = null; // Reset preset dup source
          sourcePatternForDup = null; // Reset pattern dup source
          patternPendingDelete = null; // Reset pattern pending delete
          presetPendingDelete = null; // Reset preset pending delete
          updatePatternVisuals();
          updateModeButtons();
          updatePresetSlotStyles(); // Update presets too
        }

        function updatePatternVisuals() {
          moduleTabsSticky.querySelectorAll('.pattern-tab').forEach(btn => {
            const patternValue = btn.dataset.pattern;

            // Skip special buttons (SAVE, RND OCT) - they don't participate in visual updates
            if (patternValue === 'SAVE' || patternValue === 'RND OCT') {
              // Keep original text
              btn.textContent = patternValue;
              // Add mode class if in save mode for SAVE button
              if (patternValue === 'SAVE' && patternMode === 'save') {
                btn.classList.add('is-active');
              } else {
                btn.classList.remove('is-active', 'has-data', 'dup-mode', 'clear-mode', 'is-source', 'pending-delete', 'source-selected');
              }
              return;
            }

            const num = parseInt(patternValue);
            const isActive = num === currentPattern;
            const hasSaved = patternHasData(num);
            const isPendingDelete = num === patternPendingDelete;
            const isSource = num === sourcePatternForDup || num === sourcePatternForSave;

            // Remove all state classes
            btn.classList.remove('is-active', 'has-data', 'dup-mode', 'clear-mode', 'is-source', 'pending-delete', 'source-selected');

            // Update button text based on mode
            if (patternMode === 'clear') {
              // In clear mode, ALL patterns show X
              btn.textContent = 'X';
              btn.classList.add('clear-mode');
              // Pattern pending delete gets fully lit
              if (isPendingDelete) {
                btn.classList.add('pending-delete');
              }
            } else {
              btn.textContent = num;
            }

            // Apply appropriate classes
            if (patternMode === 'dup') {
              btn.classList.add('dup-mode');
              if (isSource) {
                btn.classList.add('is-source');
              }
              // Add source-selected class to all patterns when source is selected
              if (sourcePatternForDup !== null) {
                btn.classList.add('source-selected');
              }
              // Don't show active state in dup mode
            } else if (patternMode === 'save') {
              btn.classList.add('dup-mode'); // Use same visual style as dup mode
              if (isSource) {
                btn.classList.add('is-source');
              }
              if (sourcePatternForSave !== null) {
                btn.classList.add('source-selected');
              }
            } else {
              // Only show active state in normal mode
              if (isActive) btn.classList.add('is-active');
            }

            if (hasSaved) btn.classList.add('has-data');
          });

                    track[i] = Math.floor(Math.random() * 5) + 1;

            const targetPattern = parseInt(num);

            if (patternMode === 'save') {
              // Two-click SAVE: first click selects source, second click saves to target
              if (sourcePatternForSave === null) {
                // First click - select current pattern as source
                sourcePatternForSave = currentPattern;
                updatePatternVisuals();
              } else {
                // Second click - save to target slot
                const win = getInnerWin();
                if (win && win.sequencer && win.sequencer.memory) {
                  const sourceIndex = sourcePatternForSave - 1;
                  const targetIndex = targetPattern - 1;

                  // Deep clone the source pattern
                  const sourceData = win.sequencer.memory.patternMemory[sourceIndex];
                  if (sourceData) {

              // Two-click DUP: first click selects source, second click copies to target
              if (sourcePatternForDup === null) {
                // First click - select source pattern to copy from
                if (patternHasData(targetPattern)) {
                  sourcePatternForDup = targetPattern;

                if (win && win.sequencer && win.sequencer.memory) {
                  const sourceIndex = sourcePatternForDup - 1;
                  const targetIndex = targetPattern - 1;

                  // Deep clone the source pattern
                  const sourceData = win.sequencer.memory.patternMemory[sourceIndex];
                  if (sourceData) {
                    win.sequencer.memory.patternMemory[targetIndex] = structuredClone(sourceData);

                    // Switch to the target pattern and load it
                    currentPattern = targetPattern;
                    win.sequencer.currentPatternIndex = targetIndex;
                    win.sequencer.memory.loadPattern(targetIndex);

                    // Flash animation
                    btn.classList.add('flash-copy');
                    setTimeout(() => btn.classList.remove('flash-copy'), 300);
                  }
                }
                // Exit dup mode
                sourcePatternForDup = null;
                updatePatternVisuals();
                exitPatternMode();
              }
            } else if (patternMode === 'clear') {
              // Two-click delete: first click marks, second click deletes
              if (patternPendingDelete === targetPattern) {
                // Second click - actually clear the pattern
                const win = getInnerWin();
                if (win && win.sequencer && win.sequencer.memory) {

                  win.sequencer.memory.patternMemory[index] = {

                    lead: null,
                    pad: null,
                    fx: null,
                    octaveOffsets: null,

                  win.sequencer.sequencerTracks.bass.fill(0);

      const instruments = ['synth', 'bass', 'keys', 'lead', 'pad', 'fx'];
      const probValues = [25, 50, 75, 100];
      instruments.forEach(instrument => {
        for (let i = 0; i < 384; i++) {
          // Only randomize active steps
          if (sequencer.sequencerTracks[instrument][i] > 0) {
            sequencer.probTracks[instrument][i] = probValues[Math.floor(Math.random() * probValues.length)];
          }
        }
      });
      sequencer.grid.createGrid();
      sequencer.memory.savePatternWithUI(sequencer.currentPatternIndex);
      console.log('🎲 Randomized all PROB values (25/50/75/100) on active steps');

    function resetGridPattern(sequencer) {
      // Per-track reset: clear grid, reset trigs to 1, reset probs to 100, reset octaves
      const currentInstrument = currentTrack;
      const track = sequencer.sequencerTracks[currentInstrument];

      for (let i = 0; i < 384; i++) {
        track[i] = 0; // Clear all notes
        sequencer.retrigTracks[currentInstrument][i] = 1;
        sequencer.probTracks[currentInstrument][i] = 100;

      sequencer.grid.createGrid();
      sequencer.memory.savePatternWithUI(sequencer.currentPatternIndex);

    // Expose to window so iframe can call it
    window.randomizeGridPattern = function(sequencer) {
      const currentInstrument = currentTrack;
      const track = sequencer.sequencerTracks[currentInstrument];

      // Safety check - if track doesn't exist, bail out
      if (!track) {
        showStatus(`⚠️ Can't randomize - no track data for ${currentInstrument}`);
        return;
      }

      // Use density to control fill percentage
      // density 1 (1 button lit) = 8-12% sparse (30-46 steps)
      // density 2 (2 buttons lit) = 15-25% medium (58-96 steps)
      // density 3 (3 buttons lit) = 30-40% dense/chaotic (115-154 steps)
      let fillPercentage;
      if (rndDensity === 1) {
        fillPercentage = 0.08 + Math.random() * 0.04; // 8-12%
      } else if (rndDensity === 2) {
        fillPercentage = 0.15 + Math.random() * 0.1; // 15-25%
      } else {
        fillPercentage = 0.3 + Math.random() * 0.1; // 30-40%
      }

      const numSteps = Math.floor(384 * fillPercentage);

      // SAFETY: Ensure we ALWAYS add enough notes to be audible (minimum 30 steps)
      const minSteps = Math.max(numSteps, 30);

      // Pick one random octave value for the whole pattern (mono - no chords)
      // Must be 1-5 (not 0!) because playback checks "if (stepValue > 0)"
      // Using 2-4 for musically pleasing range (avoids too high/too low)
      const octaveValue = Math.floor(Math.random() * 3) + 2; // 2-4 octave values

      // Clear current track
      for (let i = 0; i < 384; i++) {
        track[i] = 0;
        sequencer.retrigTracks[currentInstrument][i] = 1;
        sequencer.probTracks[currentInstrument][i] = 100;
      }

      // Add random notes with the same octave value (mono)
      // Use a Set to avoid duplicate indices
      const usedIndices = new Set();
      while (usedIndices.size < minSteps) {
        const randomIndex = Math.floor(Math.random() * 384);
        usedIndices.add(randomIndex);
      }

      // Apply the notes
      usedIndices.forEach(index => {
        track[index] = octaveValue;
      });

      sequencer.grid.createGrid();
      sequencer.memory.savePatternWithUI(sequencer.currentPatternIndex);

      // Flash the current track button to show regeneration
      const trackButtons = document.querySelectorAll('.track-btn');
      const trackIndex = ['synth', 'bass', 'keys', 'lead'].indexOf(currentInstrument);
      if (trackButtons[trackIndex]) {
        trackButtons[trackIndex].classList.add('flash');
        setTimeout(() => trackButtons[trackIndex].classList.remove('flash'), 300);
      }
    };

    function randomizeAllSound() {
      const doc = getInnerDoc();
      if (!doc) return;

      const editSurface = doc.querySelector('.edit-surface-injected');
      if (!editSurface) {
        console.log('Edit surface not found - switching to edit mode first');
        setMainSurfaceMode('edit');
        setTimeout(randomizeAllSound, 100);
        return;
      }

      // Click all 4 dice buttons in the edit panels
      const diceButtons = editSurface.querySelectorAll('.dice-randomize-btn');
      diceButtons.forEach(btn => {
        btn.click();
      });

      console.log('🎲 Randomized ALL SOUND parameters (SOUND + FILTER + ADSR + FX)');
    }

    function resetAllSound() {
      const win = getInnerWin();
      if (!win?.sequencer) return;

      const synthEngine = win.sequencer;
      const activeTrack = getCurrentTrackName();

      if (!synthEngine.instrumentSettings || !synthEngine.instrumentSettings[activeTrack]) return;

      // Reset to neutral/default values
      const defaults = {
        // ADSR
        attack: 0.01,
        decay: 0.1,
        sustain: 0.7,
        release: 0.3,
        // Filter ADSR
        filterAttack: 0.01,
        filterDecay: 0.1,
        filterSustain: 0.7,
        filterRelease: 0.3,
        // Filter
        filterCutoff: 1000,
        filterRes: 1,
        filterDrive: 0,
        filterTrack: 50,
        filterType: 'lowpass',
        // Sound
        waveform: 'sine',
        detune: 0,
        octave: 0,
        pan: 0,
        velocity: 1
      };

      // Apply defaults
      Object.assign(synthEngine.instrumentSettings[activeTrack], defaults);

      // Persist to localStorage
      if (synthEngine.saveInstrumentSettings) {
        synthEngine.saveInstrumentSettings();
      }

      // If in edit mode, refresh the UI
      if (mainSurfaceMode === 'edit') {
        renderEditView();
      }

      console.log('🔄 Reset all SOUND parameters to neutral defaults');
    }

    playToggle.addEventListener('click', () => {
      const win = getInnerWin();
      if (!win?.sequencer) return;
      if (win.sequencer.sequencerRunning) clickInner('stop-button');
      else clickInner('play-button');
      setTimeout(updateFromInner, 50);
    });
    // RND density control state (1 = sparse, 2 = medium, 3 = dense/chaotic)
    let rndDensity = 1;

    // Wire up RND density buttons in topbar
    const rndDensityWrapTopbar = document.getElementById('rnd-density-wrap-topbar');
    if (rndDensityWrapTopbar) {
      const densityButtons = rndDensityWrapTopbar.querySelectorAll('.rnd-density-btn');
      densityButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          const density = parseInt(btn.dataset.density);
          rndDensity = density;

          // Update active states - bottom button is 1, middle is 2, top is 3
          // Light up from bottom to clicked button
          densityButtons.forEach(b => {
            const bDensity = parseInt(b.dataset.density);
            b.classList.toggle('is-active', bDensity <= density);
          });

          console.log('🎚️ Density set to:', density);
        });
      });
    }

    // OLD RND BUTTON REMOVED - using dice/grid workflow instead
    // rndBtn.addEventListener('click', () => {
    //   const win = getInnerWin();
    //   if (win) {
    //     win.rndDensityMultiplier = rndDensity === 1 ? 1.0 : rndDensity === 2 ? 1.25 : 1.5;
    //   }
    //   clickInner('random-button');
    // });

    let genBtnHoldTimer = null;

    genBtn.addEventListener('mousedown', (e) => {
      e.preventDefault(); // Prevent click from firing immediately
      const win = getInnerWin();
      if (!win?.sequencer) return;

      const track = currentTrack;
      const trackColor = TRACK_COLORS[currentTrackNumber]?.color || '#ff5a65';

      // Immediate visual feedback
      genBtn.style.transform = 'scale(0.95)';

      // Immediate action: Generate pattern once
      randomizeGridPattern(win.sequencer);

      // Flash animation
      genBtn.style.background = trackColor;
      genBtn.style.color = 'var(--bg)';
      setTimeout(() => {
        if (!generativeMode[track]) {
          genBtn.style.background = 'transparent';
          genBtn.style.color = trackColor;
        }
      }, 200);

      // Start hold timer for activating continuous mode
      genBtnHoldTimer = setTimeout(() => {
        // After 1 second hold, activate generative mode (stay red)
        generativeMode[track] = true;
        genBtn.classList.add('is-active');
        genBtn.style.background = trackColor;
        genBtn.style.color = 'var(--bg)';
        genBtn.style.borderColor = trackColor;

        // Store generative state
        win.__generativeMode = generativeMode;
        window.__generativeMode = generativeMode;

        showStatus(`GENERATIVE MODE ON - ${track.toUpperCase()}`);
      }, 1000); // 1 second hold
    });

    genBtn.addEventListener('mouseup', () => {
      // Reset scale
      genBtn.style.transform = 'scale(1)';

      // Clear hold timer if released before 1 second
      if (genBtnHoldTimer) {
        clearTimeout(genBtnHoldTimer);
        genBtnHoldTimer = null;
      }
    });

    genBtn.addEventListener('mouseleave', () => {
      // Clear hold timer if mouse leaves button
      if (genBtnHoldTimer) {
        clearTimeout(genBtnHoldTimer);
        genBtnHoldTimer = null;
      }
    });

    genBtn.addEventListener('click', () => {
      const win = getInnerWin();
      if (!win?.sequencer) return;

      const track = currentTrack;
      const trackColor = TRACK_COLORS[currentTrackNumber]?.color || '#ff5a65';

      // If already in generative mode, clicking turns it OFF
      if (generativeMode[track]) {
        generativeMode[track] = false;
        genBtn.classList.remove('is-active');
        genBtn.style.background = 'transparent';
        genBtn.style.color = trackColor;
        genBtn.style.borderColor = trackColor;

        win.__generativeMode = generativeMode;
        window.__generativeMode = generativeMode;

        showStatus(`GENERATIVE MODE OFF - ${track.toUpperCase()}`);
      }
    });

    recBtn.addEventListener('click', () => {
      // If STP is active, exit step mode first
      if (stepModeActive) {
        const win = getInnerWin();
        if (win?.sequencer?.navigation) {
          stepModeActive = false;
          recordMode = null;
          recordState = 'idle';
          win.sequencer.navigation.stopStepRecording();
          hideStepIndicators();
          updateRecordUI();
        }
      }

      if (recordMode === 'live') {
        // Clicking REC while live recording is active - stop it
        stopRecording();
      } else {
        // Arm live recording
        armLiveRecord();
      }

      // Return focus to iframe so keyboard events work
      const win = getInnerWin();
      if (win) {
        win.focus();
      }
    });

    stpBtn.addEventListener('click', (event) => {
      const win = getInnerWin();
      if (!win?.sequencer?.navigation) return;

      if (stepModeActive) {
        // EXIT step mode - turn off STP
        stepModeActive = false;
        recordMode = null;
        recordState = 'idle';

        // Tell iframe to stop
        win.sequencer.navigation.stopStepRecording();

        // Hide step indicators, show normal playhead
        hideStepIndicators();
        updateRecordUI();
      } else {
        // If live recording is active, stop it first
        if (recordMode === 'live') {
          stopRecording();
        }

        // ENTER step mode - turn on STP
        stepModeActive = true;
        recordMode = 'step';
        recordState = 'armed';

        // Create step indicators (cleared from any previous session)
        createStepIndicators();
        updateStepIndicators();
        updateRecordUI();

        // Tell iframe to start step recording
        win.sequencer.navigation.startStepRecording(currentTrack);
      }

      // Remove focus from button
      stpBtn.blur();

      // Focus iframe so it receives keyboard events
      win.focus();
    });

    dubBtn.addEventListener('click', () => {
      toggleOverdub();
    });

    xBtn.addEventListener('click', () => {
      if (clearMode === 'track') {
        // First click: Clear current track and arm ALL mode
        clearCurrentTrack();
        armClearAll();
      } else {
        // Second click: Clear all tracks and reset to track mode
        clearAllTracks();
        resetClearMode();
      }
    });
    tempoControl.addEventListener('input', () => {
      tempoDisplay.textContent = tempoControl.value;
      const innerTempo = q('tempo');
      if (innerTempo) {
        innerTempo.value = tempoControl.value;
        innerTempo.dispatchEvent(new Event('input', { bubbles: true }));
      }
      // Update playhead timing if playing
      if (lastKnownPlaying) {
        startPlayhead();
      }
    });
    // SAVE button removed
    // document.getElementById('save-project-btn').addEventListener('click', () => frame.contentWindow?.postMessage({ type: 'jamnutz:save-project' }, '*'));

    scaleTrigger.addEventListener('click', () => scaleDropdown.classList.toggle('open'));
    settingsTrigger.addEventListener('click', () => settingsDropdown.classList.toggle('open'));
    // Set dark mode as default on load
    document.body.classList.add('is-dark');
    document.getElementById('theme-toggle').textContent = '☀';

    document.getElementById('theme-toggle').addEventListener('click', () => {
      document.body.classList.toggle('is-dark');
      document.getElementById('theme-toggle').textContent = document.body.classList.contains('is-dark') ? '☀' : '☾';
      syncInnerTheme();
    });
    document.addEventListener('click', (event) => {
      if (!scaleDropdown.contains(event.target)) scaleDropdown.classList.remove('open');
      if (!settingsDropdown.contains(event.target)) settingsDropdown.classList.remove('open');

      // Always refocus iframe after any click so keyboard works
      const win = getInnerWin();
      if (win) {
        setTimeout(() => win.focus(), 10);
      }
    });

    window.addEventListener('keydown', (event) => {
      // Handle recording-specific keys first - BEFORE forwarding
      if (event.key === 'Escape' && recordState !== 'idle') {
        event.preventDefault();
        event.stopPropagation();
        stopRecording();
        return;
      }

      // SPACEBAR: If STP is lit (step recording mode), use it for skip/rest
      // Otherwise, let it pass through for play/stop control
      if (event.key === ' ' && recordMode === 'step' && recordState !== 'idle') {
        event.preventDefault();
        event.stopPropagation();

        // If armed, ONLY start recording - don't skip yet
        if (recordState === 'armed') {
          startRecording('rest'); // Start recording with spacebar
          // Don't increment stepPosition here - let user record at step 0 or skip again
          return;
        }

        // If already recording, spacebar skips current step
        if (recordState === 'recording') {
          // Safety check
          if (stepPosition >= 32) {
            showStatus('STEP RECORD COMPLETE');
            stopRecording();
            return;
          }

          // Mark current step as skipped (blue indicator)
          const indicatorRow = document.getElementById('step-indicator-row');
          if (indicatorRow) {
            const indicator = indicatorRow.querySelector(`[data-step="${stepPosition}"]`);
            if (indicator) {
              indicator.style.background = '#0099ff'; // Blue for skipped/rest
              indicator.dataset.skipped = 'true';
            }
          }

          // Skip current step (leave it empty/rest)
          stepPosition++;

          // Update step indicators
          updateStepIndicators();

          if (stepPosition >= 32) {
            showStatus('STEP RECORD COMPLETE');
            stopRecording();
          } else {
            showStatus(`STEP RECORD (${stepPosition}/32) - SKIPPED`);
          }
        }
        return; // Don't forward to iframe
      }

      // Forward all other keys normally (including spacebar when STP is not active)
      forwardKeyboardEvent('keydown', event);
    }, true);

    window.addEventListener('keyup', (event) => forwardKeyboardEvent('keyup', event), true);

    const urlParams = new URLSearchParams(window.location.search);
    const backLink = document.getElementById('back-link');
    backLink.href = urlParams.get('from') === 'home' ? '../../../index.html' : '../../../apps.html';

    renderScalePanel();
    renderSettings();
    renderWaves();
    updateWaveState();

    // Set initial topbar styling with track color
    const initialTrackColor = TRACK_COLORS[currentTrackNumber].color;
    const topbar = document.querySelector('.topbar');
    if (topbar) {
      // Update topbar border
      topbar.style.borderBottomColor = initialTrackColor;

      // Update app name
      const appName = topbar.querySelector('.app-name');
      if (appName) appName.style.color = initialTrackColor;

      // Set CSS variable instead of inline styles - let CSS rules handle the rest
      topbar.style.setProperty('--track-color', initialTrackColor);

      // Update tempo wrap border
      const tempoWrap = topbar.querySelector('.tempo-wrap');
      if (tempoWrap) tempoWrap.style.borderColor = initialTrackColor;

      // Update tempo label and value
      const tempoLabel = topbar.querySelector('.mini-label');
      if (tempoLabel) {
        tempoLabel.style.color = initialTrackColor;
        tempoLabel.style.borderColor = initialTrackColor;
      }
      const tempoValue = topbar.querySelector('.tempo-value');
      if (tempoValue) tempoValue.style.color = initialTrackColor;

      // Update BPM slider
      const tempoControl = topbar.querySelector('#tempo-control');
      if (tempoControl) {
        tempoControl.style.setProperty('--slider-color', initialTrackColor);
      }

      // Update scale dropdown
      const scaleDropdown = topbar.querySelector('.dropdown-trigger');
      if (scaleDropdown) {
        scaleDropdown.style.borderColor = initialTrackColor;
        scaleDropdown.style.color = initialTrackColor;
        scaleDropdown.style.background = 'transparent';
      }

      // Update scale dropdown arrow (caret)
      const caret = scaleDropdown?.querySelector('.caret');
      if (caret) {
        caret.style.borderRightColor = initialTrackColor;
        caret.style.borderBottomColor = initialTrackColor;
      }

      // Update scale panel items
      const scalePanel = document.getElementById('scale-panel');
      if (scalePanel) {
        scalePanel.style.borderColor = initialTrackColor;
        scalePanel.querySelectorAll('.dropdown-item').forEach(item => {
          item.style.color = initialTrackColor;
        });
      }

      // Update wave button outlines (but keep their colored backgrounds)
      topbar.querySelectorAll('.wave-btn').forEach(btn => {
        btn.style.borderColor = initialTrackColor;
      });
    }

    window.addEventListener('message', (event) => {
      if (event.source !== frame.contentWindow || !event.data?.type) return;

      // Handle step recording messages from iframe
      if (event.data.type === 'step-record-armed') {
        recordState = 'armed';
        updateRecordUI();
        showStatus('ARMED - STEP RECORD (0/32)');
        return;
      }

      if (event.data.type === 'step-record-started') {
        recordState = 'recording';
        updateRecordUI();
        showStatus('RECORDING - STEP (1/32)');
        return;
      }

      if (event.data.type === 'step-playback-started') {
        // Recording finished, now playing back
        // stepModeActive stays TRUE - keep showing step indicators during playback
        recordState = 'idle';
        updateRecordUI();

        // Ensure animation is running
        if (!playheadAnimationFrame) {
          startPlayhead();
        }

        showStatus('PLAYING SEQUENCE');
        return;
      }

      if (event.data.type === 'step-record-stopped') {
        // Recording stopped (from iframe) - but keep stepModeActive as-is
        // Only the STP button click should turn off stepModeActive
        recordState = 'idle';
        updateRecordUI();
        return;
      }

      if (event.data.type === 'step-skipped') {
        const step = event.data.step;
        // Mark step indicator as skipped (light gray)
        const indicatorRow = document.getElementById('step-indicator-row');
        if (indicatorRow) {
          const indicator = indicatorRow.querySelector(`[data-step="${step}"]`);
          if (indicator) {
            indicator.style.background = 'rgba(128,128,128,0.15)'; // Very light gray for skipped
            indicator.dataset.skipped = 'true';
          }
        }
        return;
      }

      if (event.data.type === 'step-position-changed') {
        const step = event.data.step;
        updateStepIndicators();
        showStatus(`STEP RECORD (${step}/32)`);
        return;
      }

      if (event.data.type === 'step-record-full') {
        updateStepIndicators();
        showStatus('STEP RECORD FULL - Press any key to play');
        return;
      }

      if (event.data.type === 'note-recorded') {
        const step = event.data.step;
        updateStepIndicators();
        return;
      }

      // Other messages
      if (event.data.type === 'jamnutz:error') showStatus(event.data.message || 'Action unavailable');
      if (event.data.type === 'jamnutz:export-complete') showStatus(`${event.data.format || 'Export'} ready`);
      if (event.data.type === 'jamnutz:project-saved' || event.data.type === 'jamnutz:save-complete') showStatus('Project saved');
    });
  </script>
</body>
