<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OKINORI — JAde Wii</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #efefef;
      --line: #161616;
      --text: #111;
      --panel: #fff;
      --stop: #ffd400;
      --all: #6e31ff;
      --red: #ff385c;
      --green: #1bdb74;
      --blue: #2d7dff;
      --purple: #8a46ff;
      --orange: #ff9d00;
      --teal: #00cfc8;
      --yellow: #f4b800;
      --module-red: #ff4f4f;
      --module-pink: #ea7cff;
    }
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      min-width: 1200px;
      min-height: 900px;
      margin: 0;
      overflow: hidden;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Space Mono", monospace;
    }
    .app-scale-wrapper {
      width: 100vw;
      height: 100vh;
      min-width: 1520px;
      min-height: 900px;
      display: flex;
      flex-direction: column;
    }
    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }
    .topbar {
      display: grid;
      grid-template-columns: auto auto auto auto auto auto auto auto auto auto auto auto auto auto auto auto;
      gap: 2px !important;
      align-items: center;
      padding: 6px 10px !important;
      border-bottom: 2px solid var(--line);
      background: var(--bg);
      min-width: 0;
      flex-shrink: 0;
      height: 56px;
    }
    .nav-btn, .app-name, .header-btn, .pattern-btn, .wave-btn, .dropdown-trigger, .mini-label {
      height: 40px;
      border: 2px solid var(--line);
      background: var(--panel);
      color: var(--text);
      font: 700 14px/1 "Space Mono", monospace;
      letter-spacing: .03em;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px !important;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .nav-btn {
      width: auto;
      min-width: 16px;
      height: auto;
      padding: 0;
      text-decoration: none;
      border: 0;
      background: transparent;
      justify-content: center;
      font: 700 20px/1 "Space Mono", monospace;
      color: var(--current-track-color, var(--text));
    }
    .app-name {
      border: 0;
      background: transparent;
      justify-content: flex-start;
      padding: 0 2px 0 0;
      font: 400 30px/1 "Bebas Neue", sans-serif;
      letter-spacing: .12em;
      min-width: 0;
    }
    .header-btn {
      cursor: pointer;
      border: 2px solid var(--track-color, #ff5a65);
      color: var(--track-color, #ff5a65);
      background: transparent;
    }
    .header-btn[data-role="play"] { width: 76px; }
    .header-btn[data-role="random"], .header-btn[data-role="generate"], .header-btn[data-role="record"], .header-btn[data-role="step-record"], .header-btn[data-role="overdub"] { width: 60px; }
    .header-btn[data-role="clear"] { width: 40px; }
    .header-btn[data-role="settings"] { min-width: 118px; }
    .header-btn.is-stop { background: var(--stop); color: #000; }
    /* Universal active state for all buttons - uses current track color */
    .header-btn.is-active,
    .square-btn.is-active,
    .pattern-tab.is-active {
      background: var(--track-color, var(--current-track-color, #ff5a65)) !important;
      color: var(--bg) !important;
      border-color: var(--track-color, var(--current-track-color, #ff5a65)) !important;
    }
    .header-btn.is-all { background: var(--all); color: #fff; }
    .header-btn.is-armed { background: var(--orange); color: #000; }
    .header-btn.is-recording { background: var(--red); color: #fff; animation: pulse-record 1s ease-in-out infinite; }
    .header-btn.is-overdub-on { background: var(--purple); color: #fff; }
    .header-btn.is-active { background: var(--green); color: #000; }
    @keyframes pulse-record {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    /* RND density control - 3 small square buttons stacked vertically */
    .rnd-density-wrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
      height: 40px;
      justify-content: center;
      align-items: center;
      margin-left: 4px;
      margin-right: 12px; /* Add more space before RST button */
    }
    .rnd-density-btn {
      width: 12px;
      height: 12px;
      border: 2px solid var(--current-track-color, var(--line));
      background: transparent;
      padding: 0;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .rnd-density-btn.is-active {
      background: var(--current-track-color, var(--line));
    }

    .trig-prob-actions-wrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
      height: 40px;
      justify-content: center;
      margin: 0 !important;
    }
    .trig-prob-action-btn {
      background: transparent;
      border: 2px solid var(--current-track-color, var(--line));
      color: var(--current-track-color, var(--line));
      padding: 2px 8px !important;
      cursor: pointer;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      height: 17px;
      width: auto;
      min-width: 45px;
      transition: all 0.15s ease;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .trig-prob-action-btn:hover {
      background: var(--current-track-color, var(--line));
      color: var(--bg);
    }
    .trig-prob-action-btn.is-active {
      background: transparent;
      border-color: var(--current-track-color, var(--line));
      color: var(--current-track-color, var(--line));
      animation: pulse-button 0.6s ease-in-out infinite;
    }
    .trig-prob-action-btn.flash {
      background: var(--current-track-color, var(--line)) !important;
      border-color: var(--current-track-color, var(--line)) !important;
      color: var(--bg) !important;
      animation: flash-outline 0.3s ease-out;
    }
    @keyframes pulse-button {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes flash-outline {
      0% {
        background: var(--current-track-color, var(--line));
        color: var(--bg);
      }
      100% {
        background: transparent;
        color: var(--current-track-color, var(--line));
      }
    }

    .square-btn.pulse-cue {
      animation: pulse-button 0.6s ease-in-out infinite;
      border-color: var(--current-track-color, var(--line));
    }

    /* Remove focus outline - keyboard should always stay with iframe */
    button:focus,
    input:focus,
    select:focus {
      outline: none !important;
    }
    .tempo-wrap {
      display: grid;
      grid-template-columns: auto minmax(120px, 160px) auto;
      align-items: center;
      gap: 10px;
      height: 40px;
      border: 2px solid var(--line);
      background: var(--panel);
      padding: 0 12px;
      min-width: 212px;
    }
    .mini-label {
      border: 0;
      background: transparent;
      padding: 0;
      height: auto;
      font-size: 11px;
    }
    .tempo-value {
      font: 700 14px/1 "Space Mono", monospace;
      min-width: 42px;
      text-align: right;
    }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      background: transparent;
      margin: 0;
    }
    input[type="range"] {
      --slider-color: var(--current-track-color, #ff5a65);
    }
    input[type="range"]::-webkit-slider-runnable-track {
      height: 10px;
      background: transparent;
      border: 2px solid var(--slider-color);
      border-radius: 999px;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      background: var(--slider-color);
      border-radius: 50%;
      border: 2px solid var(--slider-color);
      margin-top: -6px;
    }
    input[type="range"]::-moz-range-track {
      height: 10px; background: transparent; border: 2px solid var(--slider-color); border-radius: 999px;
    }
    input[type="range"]::-moz-range-thumb {
      width: 18px; height: 18px; background: var(--slider-color); border: 2px solid var(--slider-color); border-radius: 50%;
    }
    .dropdown { position: relative; }
    .dropdown-trigger {
      cursor: pointer;
      min-width: 144px;
      justify-content: space-between;
      gap: 10px;
      padding: 0 14px;
    }
    .dropdown-trigger.square-btn {
      min-width: 40px;
      width: 40px;
      padding: 0;
      justify-content: center;
    }
    .dropdown-trigger .current-scale { display: inline-flex; align-items: center; padding-top: 2px; }
    .caret {
      width: 11px; height: 11px; border-right: 2px solid var(--current-track-color, #ff5a65); border-bottom: 2px solid var(--current-track-color, #ff5a65); transform: rotate(45deg) translateY(-2px);
      flex: 0 0 auto;
    }
    .dropdown-panel {
      position: absolute; top: calc(100% + 6px); left: 0; min-width: 220px; max-height: 330px; overflow: auto;
      background: var(--panel); border: 2px solid var(--line); z-index: 20; padding: 10px 0; display: none;
      box-shadow: 0 10px 18px rgba(0,0,0,.16);
    }
    .dropdown.open .dropdown-panel { display: block; }
    .dropdown-item {
      width: 100%; background: transparent; border: 0; text-align: left; padding: 14px 18px 12px 40px; cursor: pointer;
      font: 700 14px/1 "Space Mono", monospace; color: var(--text); position: relative;
    }
    .dropdown-item:hover { background: rgba(0,0,0,.06); }
    body.is-dark .dropdown-item:hover { background: rgba(255,255,255,.08); }
    .dropdown-item.is-active::before {
      content: "✓"; position: absolute; left: 16px; top: 13px; font-size: 16px;
    }
    .wave-row, .pattern-row {
      display: contents;
    }
    .pattern-btn { width: 100%; padding: 10px 14px; cursor: pointer; justify-content: flex-start; }
    .pattern-btn.is-active { background: #111; color: #fff; }
    .pattern-btn.is-dup { width: 100%; }
    .wave-btn {
      width: 46px; padding: 0; cursor: pointer; position: relative; background: transparent;
    }
    .wave-btn svg { width: 28px; height: 28px; overflow: visible; }
    .wave-btn svg * { stroke: currentColor !important; }
    .wave-btn[data-track="synth"] { color: var(--red); --accent: var(--red); }
    .wave-btn[data-track="bass"] { color: var(--green); --accent: var(--green); }
    .wave-btn[data-track="keys"] { color: var(--orange); --accent: var(--orange); }
    .wave-btn[data-track="lead"] { color: var(--purple); --accent: var(--purple); }
    .wave-btn.is-active { background: var(--accent); color: var(--bg); }
    .square-btn {
      width: 40px;
      height: 40px;
      padding: 0;
      border: 2px solid var(--track-color, #ff5a65) !important;
      background: transparent !important;
      color: var(--track-color, #ff5a65) !important;
      border-radius: 0;
      font: 700 11px/1 "Space Mono", monospace;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .square-btn:hover {
      background: var(--panel) !important;
      color: var(--text) !important;
    }
    .square-btn svg {
      display: block;
    }
    #theme-toggle {
      background: var(--panel);
      color: var(--text);
      font-size: 18px;
    }
    body.is-dark { --bg:#111; --panel:#1a1a1a; --text:#f2f2f2; --line:#f2f2f2; }
    .spacer { min-width: 0; }
    .app-frame {
      width: 100%; height: 100%; border: 0; display: block; background: #000; opacity: 0; transition: opacity .12s ease;
    }
    .app-frame.is-ready { opacity: 1; }
    .status-pill {
      position: absolute; right: 18px; bottom: 14px; z-index: 30; background: rgba(17,17,17,.92); color: #fff;
      border: 2px solid #fff; padding: 8px 10px 7px; font: 700 13px/1 "Space Mono", monospace; text-transform: uppercase; letter-spacing:.03em; display: none;
    }
    .playhead-container {
      position: relative;
      width: 100%;
      height: 8px;
      background: var(--app-surface);
      overflow: hidden;
      flex-shrink: 0;
    }
    .frame-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .playhead-bar {
      position: absolute;
      left: 0;
      top: 0;
      width: 0%;
      height: 100%;
      background: var(--current-track-color, var(--line));
      transition: none;
    }
    .playhead-bar.hidden {
      display: none;
    }
    @media (max-width: 1400px) {
      .topbar {
        grid-template-columns: repeat(8, auto) 1fr repeat(5, auto);
        overflow-x: auto;
        gap: 2px !important;
      }
    }

    /* FINAL TIGHT TOPBAR FIX - force grid columns to shrink to content */
    .topbar {
      grid-template-columns: repeat(auto-fit, minmax(0, max-content)) !important;
      gap: 6px !important;
      justify-content: flex-start !important;
      padding: 6px 10px !important;
    }

    .topbar > * {
      min-width: 0 !important;
      width: auto !important;
    }

    .header-btn, .square-btn, .trig-prob-action-btn {
      padding: 0 10px !important;
    }

    /* Add space between EDIT and GRID buttons */
    #grid-btn {
      margin-left: 24px !important;
    }

    /* Dashed outline for grid/trig/prob buttons when dice is waiting */
    .waiting-for-selection {
      border-style: dashed !important;
      animation: pulse-waiting 1.5s ease-in-out infinite;
    }

    @keyframes pulse-waiting {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="app-scale-wrapper">
    <div class="app-shell">
    <div class="topbar">
      <a class="nav-btn" id="back-link" href="../../../apps.html" aria-label="Back">←</a>
      <div class="app-name">OKINORI</div>

      <button class="header-btn" data-role="play" id="play-toggle">PLAY</button>
      <button class="header-btn" data-role="generate" id="gen-btn">GEN</button>
      <button class="header-btn" data-role="step-record" id="stp-btn">STP</button>
      <button class="header-btn" data-role="clear" id="x-btn">X</button>
      <button class="header-btn" data-role="overdub" id="dub-btn" style="display: none;">DUB</button>
      <button class="header-btn" data-role="record" id="rec-btn" style="display: none;">REC</button>

      <div class="tempo-wrap">
        <div class="mini-label">BPM</div>
        <input type="range" id="tempo-control" min="60" max="200" step="1" value="120" />
        <div class="tempo-value" id="tempo-display">120</div>
      </div>

      <div class="dropdown" id="scale-dropdown">
        <button class="dropdown-trigger" id="scale-trigger" type="button">
          <span class="current-scale" id="scale-current">MAJOR</span>
          <span class="caret"></span>
        </button>
        <div class="dropdown-panel" id="scale-panel"></div>
      </div>

      <div class="wave-row" id="wave-row"></div>
      <button class="square-btn" id="edit-btn" style="min-width: 70px;">EDIT</button>
      <button class="square-btn" id="grid-btn" aria-label="Grid">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <rect x="0" y="0" width="7" height="7"/>
          <rect x="8.5" y="0" width="7" height="7"/>
          <rect x="17" y="0" width="7" height="7"/>
          <rect x="0" y="8.5" width="7" height="7"/>
          <rect x="8.5" y="8.5" width="7" height="7"/>
          <rect x="17" y="8.5" width="7" height="7"/>
          <rect x="0" y="17" width="7" height="7"/>
          <rect x="8.5" y="17" width="7" height="7"/>
          <rect x="17" y="17" width="7" height="7"/>
        </svg>
      </button>
      <button class="square-btn" id="trig-btn">TRIG</button>
      <button class="square-btn" id="prob-btn">PROB</button>
      <button class="square-btn" id="random-trig-prob-btn" aria-label="Random">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
          <circle cx="3" cy="3" r="1.5"/>
          <circle cx="17" cy="3" r="1.5"/>
          <circle cx="3" cy="10" r="1.5"/>
          <circle cx="17" cy="10" r="1.5"/>
          <circle cx="3" cy="17" r="1.5"/>
          <circle cx="17" cy="17" r="1.5"/>
        </svg>
      </button>
      <div class="rnd-density-wrap" id="rnd-density-wrap-topbar">
        <button class="rnd-density-btn" data-density="3"></button>
        <button class="rnd-density-btn" data-density="2"></button>
        <button class="rnd-density-btn is-active" data-density="1"></button>
      </div>
      <button class="square-btn" id="reset-trig-prob-btn">RST</button>
      <div class="dropdown" id="settings-dropdown">
        <button class="dropdown-trigger square-btn" data-role="settings" id="settings-trigger" type="button">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="8" cy="8" r="3"/>
            <line x1="8" y1="1" x2="8" y2="3"/>
            <line x1="8" y1="13" x2="8" y2="15"/>
            <line x1="1" y1="8" x2="3" y2="8"/>
            <line x1="13" y1="8" x2="15" y2="8"/>
            <line x1="3.5" y1="3.5" x2="5" y2="5"/>
            <line x1="11" y1="11" x2="12.5" y2="12.5"/>
            <line x1="12.5" y1="3.5" x2="11" y2="5"/>
            <line x1="5" y1="11" x2="3.5" y2="12.5"/>
          </svg>
        </button>
        <div class="dropdown-panel" id="settings-panel"></div>
      </div>
      <button class="square-btn" id="theme-toggle" aria-label="Toggle theme">☾</button>
    </div>

    <div class="playhead-container">
      <div class="playhead-bar" id="playhead-bar"></div>
    </div>

    <div class="frame-wrap">
      <iframe class="app-frame" id="app-frame" src="app.html?v=PATTERNS8_SAVE_RNDOCT" title="OKINORI" allow="autoplay"></iframe>
      <div class="status-pill" id="status-pill"></div>
    </div>
  </div>
  </div>

  <script>
    const SCALES = [
      ["major", "MAJOR"],
      ["minor", "MINOR"],
      ["dorian", "DORIAN"],
      ["phrygian", "PHRYGIAN"],
      ["lydian", "LYDIAN"],
      ["mixolydian", "MIXOLYDIAN"],
      ["locrian", "LOCRIAN"],
      ["harmonicMinor", "HARMONIC MINOR"],
      ["melodicMinor", "MELODIC MINOR"]
    ];
    const TRACKS = [
      ["synth", "red", '<path d="M2 15 C7 7, 12 23, 18 15 S29 7, 34 15" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" />'],
      ["bass", "green", '<path d="M3 19 L12 10 L21 19 L30 10 L37 17" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" />'],
      ["keys", "orange", '<path d="M3 18 L3 11 L18 11 L18 18 L33 18 L33 11 L38 11" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="square" stroke-linejoin="miter" />'],
      ["lead", "purple", '<path d="M3 20 L15 12 L15 12 L27 20 L27 20 L39 12" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" />']
    ];

    const frame = document.getElementById('app-frame');
    const statusPill = document.getElementById('status-pill');
    const playToggle = document.getElementById('play-toggle');
    // const rndBtn = document.getElementById('rnd-btn'); // REMOVED - using dice/grid instead
    const genBtn = document.getElementById('gen-btn');
    const recBtn = document.getElementById('rec-btn');
    const stpBtn = document.getElementById('stp-btn');
    const dubBtn = document.getElementById('dub-btn');
    const xBtn = document.getElementById('x-btn');
    const tempoControl = document.getElementById('tempo-control');
    const tempoDisplay = document.getElementById('tempo-display');
    const scaleDropdown = document.getElementById('scale-dropdown');
    const gridBtn = document.getElementById('grid-btn');
    const editBtn = document.getElementById('edit-btn');
    const trigBtn = document.getElementById('trig-btn');
    const probBtn = document.getElementById('prob-btn');
    const randomTrigProbBtn = document.getElementById('random-trig-prob-btn');
    const resetTrigProbBtn = document.getElementById('reset-trig-prob-btn');
    const scaleTrigger = document.getElementById('scale-trigger');
    const scaleCurrent = document.getElementById('scale-current');
    const scalePanel = document.getElementById('scale-panel');
    const settingsDropdown = document.getElementById('settings-dropdown');
    const settingsTrigger = document.getElementById('settings-trigger');
    const settingsPanel = document.getElementById('settings-panel');
    const waveRow = document.getElementById('wave-row');
    const playheadBar = document.getElementById('playhead-bar');

    let clearMode = 'track';
    let keyboardVisible = false;
    let currentTrack = 'synth';
    let currentTrackNumber = 1; // Track 1-4 for color system
    let currentModule = 'groove';
    let initialized = false;
    let lastKnownPlaying = false;
    let globalOpenModule = null;  // Reference to the openModule function
    let playheadAnimationFrame = null;
    let mainSurfaceMode = 'grid';  // 'grid' or 'edit'

    // Persistent panel state - survives across renderEditView() calls
    let activeEnvelopeMode = 'amp';  // 'amp' or 'filter'
    let activeFxType = 'delay';      // 'delay', 'reverb', or 'chorus'
    let activeFilterType = 'lp';     // 'lp', 'hp', 'bp', or 'notch'

    // Recording state - clean state machine
    let recordMode = null;           // null | 'live' | 'step'
    let recordState = 'idle';        // 'idle' | 'armed' | 'recording'
    let overdubMode = false;         // false = clear pattern first, true = layer on top
    let stepPosition = 0;            // 0-31 for step record
    let patternBackup = null;        // For cancel/restore if needed
    let generativeMode = {           // Auto-generate new pattern at end of loop (per track)
      synth: false,
      bass: false,
      keys: false,
      lead: false
    };
    let recordedNoteRange = { min: null, max: null }; // Track octave range during recording

    // Transport display mode - controls what visual feedback is shown
    let stepModeActive = false;      // true = show step indicators, false = show normal playhead

    // Track color system
    const TRACK_COLORS = {
      1: { name: 'red', color: '#ff5a65', darkColor: '#cc4851', className: 'module-red' },
      2: { name: 'green', color: '#1bdb74', darkColor: '#15af5c', className: 'module-green' },

      // Sync ADSR values - IDs in EDIT mode are prefixed like "edit-synth-attack"
      const adsrParams = {
        attack: settings.attack,
        decay: settings.decay,
        sustain: settings.sustain,
        release: settings.release
      };

      Object.entries(adsrParams).forEach(([param, value]) => {

        const display = doc.getElementById(`${prefix}-${param}-value`);

        console.log(`SYNC ${param}:`, {
          value,
          sliderId: `${prefix}-${param}`,
          slider: !!slider,
          display: !!display
        });

        if (slider && display) {
          slider.value = value;
          display.textContent = value.toFixed(2);

          // Update knob visual angle using CSS custom property
          const knobContainer = slider.closest('.okn-adsr-knob');
          const knob = knobContainer?.querySelector('.knob[data-param="' + param + '"]');

          if (knob) {
            const min = parseFloat(slider.min || 0);
            const max = parseFloat(slider.max || 1);
            const ratio = max === min ? 0 : (value - min) / (max - min);
            const angle = ratio * 270; // 270 degrees is full range
            knob.style.setProperty('--knob-angle', `${angle}deg`);
          }
        }
      });

      console.log('SYNC: Complete');
    }

    function createStepIndicators() {
      // Check if indicator row already exists
      let indicatorRow = document.getElementById('step-indicator-row');
      if (!indicatorRow) {
        // Create indicator row in the playhead bar area
        const playheadContainer = document.querySelector('.playhead-container');
        if (!playheadContainer) return;

        indicatorRow = document.createElement('div');
        indicatorRow.id = 'step-indicator-row';
        indicatorRow.style.cssText = `
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          display: grid;
          grid-template-columns: repeat(32, 1fr);
          gap: 1px;
          padding: 0 2px;
          pointer-events: none;
          z-index: 5;
        `;

        // Create 32 step indicator cells
        for (let i = 0; i < 32; i++) {
          const indicator = document.createElement('div');
          indicator.className = 'step-indicator';
          indicator.dataset.step = i;
          indicator.style.cssText = `
            height: 100%;
            background: transparent;
            transition: background 0.1s;
          `;
          indicatorRow.appendChild(indicator);
        }

        // Add to playhead container
        playheadContainer.appendChild(indicatorRow);
      } else {
        // Clear all skipped markers from previous session
        const indicators = indicatorRow.querySelectorAll('.step-indicator');
        indicators.forEach(indicator => {
          indicator.style.background = 'transparent';
          indicator.dataset.skipped = 'false';
        });
      }

      return indicatorRow;
    }

    function updateStepIndicators() {
      const win = getInnerWin();
      if (!win?.sequencer?.sequencerTracks) return;

      // Indicator row is in outer document (index.html), not iframe
      const indicatorRow = document.getElementById('step-indicator-row');
      if (!indicatorRow) return;

      const trackData = win.sequencer.sequencerTracks[currentTrack];
      if (!trackData) return;

      const trackColor = TRACK_COLORS[currentTrackNumber].color;

      // Get current step position from iframe
      const currentStep = win.sequencer?.navigation?.stepPosition || 0;

      // Update each step indicator
      for (let step = 0; step < 32; step++) {
        const indicator = indicatorRow.querySelector(`[data-step="${step}"]`);
        if (!indicator) continue;

        // Skip if already marked as skipped (blue)
        if (indicator.dataset.skipped === 'true') {
          continue; // Keep blue background
        }

        // Check if any note exists in this column (any row)
        let hasNote = false;
        for (let row = 0; row < 12; row++) {
          const cellIndex = row * 32 + step;
          if (trackData[cellIndex] > 0) {
            hasNote = true;
            break;
          }
        }

        // Update background based on whether step has notes
        if (hasNote) {
          indicator.style.background = trackColor;
        } else {
          indicator.style.background = 'transparent';
        }

        // No outline for current position - only show filled/skipped steps
        indicator.style.outline = 'none';
      }
    }

    function hideStepIndicators() {
      // Indicator row is in outer document (index.html), not iframe
      const indicatorRow = document.getElementById('step-indicator-row');
      if (indicatorRow) {
        indicatorRow.remove();
      }
    }

    function animateStepIndicators(currentStep) {
      const indicatorRow = document.getElementById('step-indicator-row');
      if (!indicatorRow) return;

      const trackColor = TRACK_COLORS[currentTrackNumber].color;

      // Update all indicators
      for (let step = 0; step < 32; step++) {
        const indicator = indicatorRow.querySelector(`[data-step="${step}"]`);
        if (!indicator) continue;

        // If this is the currently playing step, make it white with red outline
        if (step === currentStep) {
          indicator.style.background = 'white';
          indicator.style.outline = `2px solid ${trackColor}`;
          indicator.style.outlineOffset = '-2px';
        } else {
          // Restore original state (filled/skipped/empty)
          if (indicator.dataset.skipped === 'true') {
            indicator.style.background = 'rgba(128,128,128,0.15)';
          } else {
            // Check if this step has notes from grid data
            const win = getInnerWin();
            if (win?.sequencer?.sequencerTracks) {
              const trackData = win.sequencer.sequencerTracks[currentTrack];
              if (trackData) {
                let hasNote = false;
                for (let row = 0; row < 12; row++) {
                  const cellIndex = row * 32 + step;
                  if (trackData[cellIndex] > 0) {
                    hasNote = true;
                    break;
                  }
                }
                indicator.style.background = hasNote ? trackColor : 'transparent';
              }
            }
          }
          indicator.style.outline = 'none';
        }
      }
    }

    function recordNoteToGrid(note, stepIndex) {
      const win = getInnerWin();
      if (!win?.sequencer?.sequencerTracks || !win?.keyboard) return;

      // Ensure sequencer track array exists
      if (!win.sequencer.sequencerTracks[currentTrack]) {
        win.sequencer.sequencerTracks[currentTrack] = Array(384).fill(0);
      }

      // Get current scale
      const currentScale = win.keyboard.currentScale || 'major';
      const scales = win.keyboard.scales;
      const scaleNotes = scales[currentScale] || scales.major;

      // Parse note name (e.g., "C4", "D#5", "Gb3")
      const noteMatch = note.match(/^([A-G][b#]?)(\d+)$/);
      if (!noteMatch) {
        console.warn('Invalid note format:', note);
        return;
      }

      const noteName = noteMatch[1];
      const noteOctave = parseInt(noteMatch[2]);

      // Map note name to semitone (C=0, C#=1, D=2, etc.)
      const noteNames = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
      const flatToSharp = { "Db": "C#", "Eb": "D#", "Gb": "F#", "Ab": "G#", "Bb": "A#" };
      const normalizedNote = flatToSharp[noteName] || noteName;
      const semitone = noteNames.indexOf(normalizedNote);

      if (semitone === -1) {
        console.warn('Unknown note name:', noteName);
        return;
      }

      // Find which scale degree this note is (if it's in the scale)
      let scaleDegree = -1;
      let octaveOffset = 0;

      // Check if note is in current scale
      for (let i = 0; i < scaleNotes.length; i++) {
        if (scaleNotes[i] === semitone) {
          scaleDegree = i;
          break;
        }
      }

      // If not in scale, find closest scale note (quantize)
      if (scaleDegree === -1) {
        // Find closest note in scale
        let minDist = 12;
        for (let i = 0; i < scaleNotes.length; i++) {
          const dist = Math.abs(scaleNotes[i] - semitone);
          if (dist < minDist) {
            minDist = dist;
            scaleDegree = i;
          }
        }
      }

      // Calculate which row (0-11, where 11 is bottom, 0 is top)
      // Grid shows 12 notes (one octave in scale)
      const noteIndexFromBottom = scaleDegree;
      const row = 11 - noteIndexFromBottom; // Invert: row 0 = top note, row 11 = bottom note

      // Calculate octave value (1-4, where 2 is middle)
      // Base octave for grid display - matches keyboard.keyboardOctave (octave 2)
      const gridBaseOctave = 2; // Grid represents octave 2 (matches keyboard base octave)
      const octaveDiff = noteOctave - gridBaseOctave;

      // Map to sequencer octave values (0-4)
      // 0 = very low (darker), 1 = low, 2 = middle, 3 = high, 4 = very high (lighter)
      let octaveValue = 2 + octaveDiff; // Offset from middle
      octaveValue = Math.max(0, Math.min(4, octaveValue));

      // Calculate grid cell position
      const column = stepIndex;
      const cellIndex = row * 32 + column;

      // Write octave value to sequencer track
      win.sequencer.sequencerTracks[currentTrack][cellIndex] = octaveValue;

      console.log(`Recorded ${note} → scaleDegree=${scaleDegree}, row=${row}, step=${stepIndex}, octave=${octaveValue}, cell=${cellIndex}, track=${currentTrack}, scale=${currentScale}`);

      // Refresh grid to show new note
      if (win.sequencer.grid?.createGrid) {
        win.sequencer.grid.createGrid();
      }

      // Flash the cell to show feedback
      flashGridCell(row, column);

      // Update step indicators
      updateStepIndicators();
    }

    function handleRecordedNote(note) {
      console.log('Note recorded:', note, { recordMode, recordState });

      // If armed, start recording
      if (recordState === 'armed') {
        startRecording(note);
      }

      // If not recording, ignore
      if (recordState !== 'recording') return;

      if (recordMode === 'step') {
        // Safety check
        if (stepPosition >= 32) {
          console.warn('Step position already at limit:', stepPosition);
          showStatus('STEP RECORD COMPLETE');
          stopRecording();
          return;
        }

        // Step record: add to current step and advance
        console.log(`Recording to step ${stepPosition}, then advancing...`);
        recordNoteToGrid(note, stepPosition);
        stepPosition++;
        console.log(`Advanced to step ${stepPosition}`);

        if (stepPosition >= 32) {
          // Reached end of pattern, stop recording
          showStatus('STEP RECORD COMPLETE');
          stopRecording();
        } else {
          showStatus(`STEP RECORD (${stepPosition}/32)`);
        }
      } else if (recordMode === 'live') {
        // Live record: quantize to current playback position
        const win = getInnerWin();
        if (win?.sequencer) {
          // Get current step from sequencer
          let currentStep = win.sequencer.currentStep || 0;

          // Record to that step
          recordNoteToGrid(note, currentStep);

          showStatus(`LIVE RECORDING (step ${currentStep})`);
        }
      }
    }

    function buildSoundPanel(doc, track, trackColor) {
      const container = doc.createElement('div');
      const color = trackColor.color;
      const colorRgb = color.replace('#', '');
      const r = parseInt(colorRgb.substr(0,2), 16);
      const g = parseInt(colorRgb.substr(2,2), 16);
      const b = parseInt(colorRgb.substr(4,2), 16);
      const prefix = `edit-${track}`;

      // Determine waveform based on track
      const waveforms = {
        synth: 'sine',
        bass: 'triangle',
        keys: 'square',
        lead: 'sawtooth'
      };
      const waveType = waveforms[track] || 'sine';

      // Generate waveform path based on type
      const generateWavePath = (type) => {
        const width = 400;
        const height = 80;
        const centerY = height / 2;
        const amplitude = 30;
        const frequency = 3;
        let path = `M 0,${centerY}`;

        if (type === 'sine') {
          for (let x = 0; x <= width; x += 2) {
            const y = centerY + amplitude * Math.sin((x / width) * frequency * Math.PI * 2);
            path += ` L ${x},${y}`;
          }
        } else if (type === 'square') {
          const period = width / frequency;
          for (let i = 0; i < frequency; i++) {
            const x1 = i * period;
            const x2 = x1 + period / 2;
            const x3 = (i + 1) * period;
            path += ` L ${x1},${centerY - amplitude} L ${x2},${centerY - amplitude} L ${x2},${centerY + amplitude} L ${x3},${centerY + amplitude}`;
          }
        } else if (type === 'sawtooth') {
          const period = width / frequency;
          for (let i = 0; i < frequency; i++) {
            const x1 = i * period;
            const x2 = (i + 1) * period;
            path += ` L ${x1},${centerY + amplitude} L ${x2},${centerY - amplitude}`;
          }
        } else if (type === 'triangle') {
          const period = width / frequency;
          for (let i = 0; i < frequency; i++) {
            const x1 = i * period;
            const x2 = x1 + period / 2;
            const x3 = (i + 1) * period;
            path += ` L ${x1},${centerY + amplitude} L ${x2},${centerY - amplitude} L ${x3},${centerY + amplitude}`;
          }
        }
        return path;
      };

      const wavePath = generateWavePath(waveType);

      container.innerHTML = `
        <div style="padding: 16px; --adsr-accent: ${color};">
          <!-- Oscilloscope Display -->
          <div style="background: rgba(${r},${g},${b},0.2); border-radius: 8px; padding: 12px; margin-bottom: 16px;">
            <canvas id="${prefix}-oscilloscope" width="800" height="100" style="width: 100%; height: 65px; display: block;"></canvas>
          </div>

          <!-- Sound Knobs -->
          <div style="display: flex; gap: 12px; justify-content: space-around; align-items: flex-start;">
            <!-- Octave Knob -->
            <div style="display: flex; flex-direction: column; align-items: center; gap: 4px;">
              <label style="font: 700 11px 'Space Mono', monospace; color: ${color}; opacity: 0.8;">Octave</label>
              <div class="knob adsr-knob-ring knob-style-d" data-knob="octave" style="--knob-angle: 135deg; width: 68px; height: 68px; position: relative; cursor: pointer; display: grid; place-items: center; flex-shrink: 0;">
                <svg viewBox="0 0 68 68" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none;">
                  <circle cx="34" cy="34" r="30" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"></circle>
                </svg>
              </div>
              <input type="range" id="${prefix}-sound-octave" min="0" max="4" step="1" value="2" hidden>
              <span id="${prefix}-sound-octave-value" style="font: 700 12px 'Space Mono', monospace; color: ${color};">2</span>
            </div>

            <!-- Detune Knob -->

    function renderEditView() {
      const doc = getInnerDoc();
      if (!doc) return;

      // Inject FX knob CSS into iframe if not already present
      if (!doc.getElementById('fx-knob-styles')) {
        const style = doc.createElement('style');
        style.id = 'fx-knob-styles';
        style.textContent = `
          .fx-knob-ring {
            position: relative;
            width: 68px;
            height: 68px;
            display: grid;
            place-items: center;
          }
          .fx-knob-ring::before {
            content: "";
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #1d1d1d;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 8px 16px rgba(0,0,0,0.28);
            position: relative;
            z-index: 2;
          }
          .fx-knob-ring svg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            transform: rotate(-90deg);
            z-index: 1;
          }
        `;
        doc.head.appendChild(style);
      }

      const sequencerGrid = doc.getElementById('sequencer-grid');
      if (!sequencerGrid) return;

      // Hide all grid cells first
      sequencerGrid.querySelectorAll('.grid-cell').forEach(cell => {
        cell.style.display = 'none';
      });

      // Remove existing edit surface if present
      let editSurface = sequencerGrid.querySelector('.edit-surface-injected');
      if (!editSurface) {
        editSurface = doc.createElement('div');
        editSurface.className = 'edit-surface-injected';
        sequencerGrid.appendChild(editSurface);
      }

      // Get current track info
      const trackColor = TRACK_COLORS[currentTrackNumber];
      const trackNames = { synth: 'Track 1', bass: 'Track 2', keys: 'Track 3', lead: 'Track 4' };
      const trackName = trackNames[currentTrack] || 'Track';

      editSurface.innerHTML = '';

      // Define the 4 sections for the selected track
      const sections = [
        { title: 'SOUND', content: buildSoundPanel(doc, currentTrack, trackColor) },
        { title: 'FILTER', content: buildFilterPanel(doc, currentTrack, trackColor) },
        { title: 'ADSR', content: buildADSRPanel(doc, currentTrack, trackColor) },
        { title: 'FX', content: buildFXPanel(doc, currentTrack, trackColor) }
      ];

      sections.forEach((section) => {
        const panel = doc.createElement('div');
        panel.className = 'edit-panel';
        panel.dataset.panel = section.title.toLowerCase();
        panel.style.cssText = `
          background: var(--app-surface);
          border: 2px solid ${trackColor.color};
          overflow-y: auto;
          position: relative;
        `;

        const header = doc.createElement('div');
        header.className = 'edit-panel-header';
        header.style.cssText = `
          padding: 8px 12px;
          border-bottom: 2px solid ${trackColor.color};
          font: 700 11px/1 "Space Mono", monospace;
          display: flex;
          align-items: center;
          justify-content: space-between;
          color: ${trackColor.color};
        `;

        const titleSpan = doc.createElement('span');
        titleSpan.textContent = section.title;

        const diceBtn = doc.createElement('button');
        diceBtn.className = 'dice-randomize-btn';
        diceBtn.dataset.panel = section.title.toLowerCase();
        diceBtn.style.cssText = `
          background: transparent;
          border: 2px solid ${trackColor.color};
          color: ${trackColor.color};
          width: 20px;
          height: 20px;
          padding: 2px;
          cursor: pointer;
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          grid-template-rows: repeat(3, 1fr);
          gap: 1px;
          border-radius: 3px;
          opacity: 0.7;
          transition: opacity 0.1s;
        `;
        // Create 6 dots in dice pattern (showing 6)
        const dotPositions = [0, 2, 3, 5, 6, 8]; // Grid positions for dice 6
        for (let i = 0; i < 9; i++) {
          const dot = doc.createElement('div');
          dot.style.cssText = `
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: ${dotPositions.includes(i) ? trackColor.color : 'transparent'};
          `;
          diceBtn.appendChild(dot);
        }
        diceBtn.title = `Randomize ${section.title}`;

        diceBtn.addEventListener('mouseenter', () => diceBtn.style.opacity = '1');
        diceBtn.addEventListener('mouseleave', () => diceBtn.style.opacity = '0.7');

        // Add click visual feedback - flash track color with white dots
        diceBtn.addEventListener('click', () => {
          const originalBg = diceBtn.style.background;
          diceBtn.style.background = trackColor.color;

          // Make dots white during flash
          diceBtn.querySelectorAll('div').forEach((dot, idx) => {
            if (dotPositions.includes(idx)) {
              dot.style.background = '#fff';
            }
          });

          setTimeout(() => {
            diceBtn.style.background = originalBg;
            // Restore dot colors
            diceBtn.querySelectorAll('div').forEach((dot, idx) => {
              if (dotPositions.includes(idx)) {
                dot.style.background = trackColor.color;
              }
            });
          }, 150);
        });

        header.appendChild(titleSpan);
        header.appendChild(diceBtn);

        const content = doc.createElement('div');
        content.className = 'edit-panel-content';
        content.style.cssText = 'padding: 12px; color: var(--app-text); overflow-y: auto;';
        content.appendChild(section.content);

        panel.appendChild(header);
        panel.appendChild(content);
        editSurface.appendChild(panel);
      });

      // Wire up dice randomize buttons
      editSurface.querySelectorAll('.dice-randomize-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const panelType = btn.dataset.panel;
          const panel = editSurface.querySelector(`.edit-panel[data-panel="${panelType}"]`);
          if (!panel) return;

          const synthEngine = getSynthEngine();
          const activeTrack = getCurrentTrackName();

          // Get all range inputs (knobs) in this panel
          const knobs = panel.querySelectorAll('input[type="range"]');
          knobs.forEach(input => {
            const min = parseFloat(input.min);
            const max = parseFloat(input.max);
            const step = parseFloat(input.step || 1);
            const range = max - min;

            let randomValue;
            // For ADSR panel, favor short envelopes 30% of the time
            if (panelType === 'adsr') {
              const paramName = input.id.split('-').pop();
              const favorShort = Math.random() < 0.3;

              if (favorShort && (paramName === 'decay' || paramName === 'release')) {
                // Heavily bias toward minimum (0-20% of range)
                randomValue = min + Math.random() * (range * 0.2);
              } else if (favorShort && paramName === 'sustain') {
                // Random sustain for short sounds
                randomValue = min + Math.random() * range;
              } else {
                // Normal random distribution
                randomValue = min + Math.random() * range;
              }

              // Round to step
              randomValue = min + Math.round((randomValue - min) / step) * step;
            } else {
              randomValue = min + Math.floor(Math.random() * (range / step + 1)) * step;
            }

            input.value = randomValue;

            // Update knob visual position
            const knobRing = panel.querySelector(`.adsr-knob-ring[data-knob="${input.id.split('-').pop()}"]`);
            if (knobRing) {
              const ratio = (randomValue - min) / range;
              knobRing.style.setProperty('--knob-angle', `${ratio * 270}deg`);
            }

            // Update value display
            const valueDisplay = panel.querySelector(`#${input.id}-value`);
            if (valueDisplay) {
              valueDisplay.textContent = Math.round(randomValue);
            }

            // Update audio settings based on parameter
            if (synthEngine && synthEngine.instrumentSettings && synthEngine.instrumentSettings[activeTrack] && synthEngine.audioContext) {
              const paramName = input.id.split('-').pop();
              const now = synthEngine.audioContext.currentTime;

              if (paramName === 'special') {
                synthEngine.instrumentSettings[activeTrack].special = randomValue;
              } else if (paramName === 'pan') {
                const panValue = randomValue / 50;
                synthEngine.instrumentSettings[activeTrack].pan = panValue;
                if (synthEngine.trackPanners && synthEngine.trackPanners[activeTrack]) {
                  const panNode = synthEngine.trackPanners[activeTrack];
                  try {
                    panNode.pan.cancelScheduledValues(now);
                    panNode.pan.setTargetAtTime(panValue, now, 0.015);
                  } catch(e) {
                    panNode.pan.value = panValue;
                  }
                }
              } else if (paramName === 'octave') {
                synthEngine.instrumentSettings[activeTrack].octave = randomValue;
                // Update active oscillators with smooth transition
                if (synthEngine.activeOscillators) {
                  Object.keys(synthEngine.activeOscillators).forEach(note => {
                    const gainData = synthEngine.activeGains[note];
                    if (gainData && gainData.instrument === activeTrack) {
                      const osc = synthEngine.activeOscillators[note];
                      if (osc && osc.frequency) {
                        const baseFreq = synthEngine.noteToFrequency(note);
                        const octaveMultiplier = Math.pow(2, randomValue - 2);
                        osc.frequency.cancelScheduledValues(now);
                        osc.frequency.setTargetAtTime(baseFreq * octaveMultiplier, now, 0.015);
                      }
                    }
                  });
                }
              } else if (paramName === 'detune') {
                synthEngine.instrumentSettings[activeTrack].detune = randomValue;
                // Update active oscillators with smooth transition
                if (synthEngine.activeOscillators) {
                  Object.keys(synthEngine.activeOscillators).forEach(note => {
                    const gainData = synthEngine.activeGains[note];
                    if (gainData && gainData.instrument === activeTrack) {
                      const osc = synthEngine.activeOscillators[note];
                      if (osc && osc.detune) {
                        osc.detune.cancelScheduledValues(now);
                        osc.detune.setTargetAtTime(randomValue, now, 0.015);
                      }
                    }
                  });
                }
              } else if (paramName === 'attack' || paramName === 'decay' || paramName === 'sustain' || paramName === 'release') {
                // ADSR parameters - save based on active envelope mode
                if (activeEnvelopeMode === 'amp') {
                  synthEngine.instrumentSettings[activeTrack][paramName] = randomValue;
                } else {
                  // Filter envelope mode
                  const capitalizedParam = paramName.charAt(0).toUpperCase() + paramName.slice(1);
                  synthEngine.instrumentSettings[activeTrack][`filter${capitalizedParam}`] = randomValue;
                }
              } else if (paramName === 'cutoff') {
                // Map 10-100 to frequency range: ~63Hz - 20000Hz (logarithmic, prevents silence)
                const freqValue = 20 * Math.pow(1000, randomValue / 100);
                synthEngine.instrumentSettings[activeTrack].filterCutoff = freqValue;
                if (synthEngine.trackFilters && synthEngine.trackFilters[activeTrack]) {
                  const filterNode = synthEngine.trackFilters[activeTrack];
                  try {
                    filterNode.frequency.cancelScheduledValues(now);
                    filterNode.frequency.setTargetAtTime(freqValue, now, 0.015);
                  } catch(e) {
                    filterNode.frequency.value = freqValue;
                  }
                }
              } else if (paramName === 'res') {
                // Map 0-100 to Q range: 0.1 - 30
                const qValue = 0.1 + (randomValue / 100) * 29.9;
                synthEngine.instrumentSettings[activeTrack].filterRes = qValue;
                if (synthEngine.trackFilters && synthEngine.trackFilters[activeTrack]) {
                  const filterNode = synthEngine.trackFilters[activeTrack];
                  try {
                    filterNode.Q.cancelScheduledValues(now);
                    filterNode.Q.setTargetAtTime(qValue, now, 0.015);
                  } catch(e) {
                    filterNode.Q.value = qValue;
                  }
                }
              } else if (paramName === 'drive') {
                synthEngine.instrumentSettings[activeTrack].filterDrive = randomValue;
              } else if (paramName === 'track') {
                synthEngine.instrumentSettings[activeTrack].filterTrack = randomValue;
              }
            }
          });

          // Persist all randomized settings to localStorage
          if (synthEngine && synthEngine.saveInstrumentSettings) {
            synthEngine.saveInstrumentSettings();
          }

          // If this is ADSR panel, update the envelope preview and Shape/Level
          if (panelType === 'adsr') {
            const adsrPanel = panel.querySelector('[data-adsr-track]');
            if (adsrPanel) {
              const prefix = adsrPanel.dataset.adsrPrefix;
              const attackInput = adsrPanel.querySelector(`#${prefix}-attack`);
              const decayInput = adsrPanel.querySelector(`#${prefix}-decay`);
              const sustainInput = adsrPanel.querySelector(`#${prefix}-sustain`);
              const releaseInput = adsrPanel.querySelector(`#${prefix}-release`);
              const previewPath = adsrPanel.querySelector(`#${prefix}-adsr-preview-path`);
              const previewFill = adsrPanel.querySelector(`#${prefix}-adsr-preview-fill`);
              const shapeValue = adsrPanel.querySelector(`#${prefix}-adsr-shape-value`);
              const levelValue = adsrPanel.querySelector(`#${prefix}-adsr-level-value`);

              if (attackInput && decayInput && sustainInput && releaseInput && previewPath && previewFill) {
                const normalize = (inp) => {
                  const min = Number(inp.min || 0);
                  const max = Number(inp.max || 1);
                  const value = Number(inp.value || min);
                  return max === min ? 0 : (value - min) / (max - min);
                };
                const a = normalize(attackInput);
                const d = normalize(decayInput);
                const s = normalize(sustainInput);
                const r = normalize(releaseInput);
                const x1 = 8 + a * 24;
                const x2 = x1 + 12 + d * 20;
                const x3 = x2 + 18;
                const sustainY = 20 + (1 - s) * 26;
                const endX = Math.min(100, x3 + 16 + r * 18);
                const path = `M0,54 L${x1.toFixed(1)},10 L${x2.toFixed(1)},${sustainY.toFixed(1)} L${x3.toFixed(1)},${sustainY.toFixed(1)} L${endX.toFixed(1)},54`;
                const fill = `${path} L100,64 L0,64 Z`;
                previewPath.setAttribute('d', path);
                previewFill.setAttribute('d', fill);

                // Update Shape/Level
                if (shapeValue && levelValue) {
                  const avgTime = (Number(attackInput.value) + Number(decayInput.value) + Number(releaseInput.value)) / 3;
                  const shapeText = avgTime < 0.4 ? 'Tight' : avgTime < 1 ? 'Balanced' : avgTime < 2 ? 'Smooth' : 'Wide';
                  shapeValue.textContent = shapeText;
                  levelValue.textContent = `${Math.round(Number(sustainInput.value) * 100)}%`;
                }
              }
            }
          }
        });
      });

      // Wire up ADSR knobs after all panels are in DOM
      const adsrPanelWrapper = editSurface.querySelector('.edit-panel[data-panel="adsr"]');
      if (adsrPanelWrapper) {
        const adsrPanel = adsrPanelWrapper.querySelector('[data-adsr-track]');
        if (adsrPanel) {

        const track = adsrPanel.dataset.adsrTrack;
        const prefix = adsrPanel.dataset.adsrPrefix;

        // activeEnvelopeMode is now persistent in global scope

        const knobs = adsrPanel.querySelectorAll('.adsr-knob-ring');
        knobs.forEach(knob => {
          const param = knob.dataset.knob;
          const input = adsrPanel.querySelector(`#${prefix}-${param}`);
          const valueDisplay = adsrPanel.querySelector(`#${prefix}-${param}-value`);

          if (!input || !valueDisplay) return;

          let startY = 0, startVal = 0, min = 0, max = 1;

          const updateEnvelopePreview = () => {
            const attackInput = adsrPanel.querySelector(`#${prefix}-attack`);
            const decayInput = adsrPanel.querySelector(`#${prefix}-decay`);
            const sustainInput = adsrPanel.querySelector(`#${prefix}-sustain`);
            const releaseInput = adsrPanel.querySelector(`#${prefix}-release`);
            const previewPath = adsrPanel.querySelector(`#${prefix}-adsr-preview-path`);
            const previewFill = adsrPanel.querySelector(`#${prefix}-adsr-preview-fill`);

            if (!attackInput || !decayInput || !sustainInput || !releaseInput || !previewPath || !previewFill) return;

            const normalize = (inp) => {
              const min = Number(inp.min || 0);
              const max = Number(inp.max || 1);
              const value = Number(inp.value || min);
              return max === min ? 0 : (value - min) / (max - min);
            };

            const a = normalize(attackInput);
            const d = normalize(decayInput);
            const s = normalize(sustainInput);
            const r = normalize(releaseInput);
            const x1 = 8 + a * 24;
            const x2 = x1 + 12 + d * 20;
            const x3 = x2 + 18;
            const sustainY = 20 + (1 - s) * 26;
            const endX = Math.min(100, x3 + 16 + r * 18);
            const path = `M0,54 L${x1.toFixed(1)},10 L${x2.toFixed(1)},${sustainY.toFixed(1)} L${x3.toFixed(1)},${sustainY.toFixed(1)} L${endX.toFixed(1)},54`;
            const fill = `${path} L100,64 L0,64 Z`;
            previewPath.setAttribute('d', path);
            previewFill.setAttribute('d', fill);
          };

          const updateKnobVisual = (value, writeToEngine = true) => {
            const minVal = parseFloat(input.min);
            const maxVal = parseFloat(input.max);
            const ratio = maxVal === minVal ? 0 : (value - minVal) / (maxVal - minVal);
            knob.style.setProperty('--knob-angle', `${ratio * 270}deg`);
            valueDisplay.textContent = value.toFixed(2);
            updateEnvelopePreview();

            // Update Shape and Level readouts
            const shapeValue = adsrPanel.querySelector(`#${prefix}-adsr-shape-value`);
            const levelValue = adsrPanel.querySelector(`#${prefix}-adsr-level-value`);
            if (shapeValue && levelValue) {
              const attackInput = adsrPanel.querySelector(`#${prefix}-attack`);
              const decayInput = adsrPanel.querySelector(`#${prefix}-decay`);
              const sustainInput = adsrPanel.querySelector(`#${prefix}-sustain`);
              const releaseInput = adsrPanel.querySelector(`#${prefix}-release`);
              if (attackInput && decayInput && releaseInput && sustainInput) {
                const avgTime = (Number(attackInput.value) + Number(decayInput.value) + Number(releaseInput.value)) / 3;
                const shapeText = avgTime < 0.4 ? 'Tight' : avgTime < 1 ? 'Balanced' : avgTime < 2 ? 'Smooth' : 'Wide';
                shapeValue.textContent = shapeText;
                levelValue.textContent = `${Math.round(Number(sustainInput.value) * 100)}%`;
              }
            }

            // Only write to engine if explicitly requested (not during initialization)
            if (writeToEngine) {
              const synthEngine = getSynthEngine();
              const activeTrack = getCurrentTrackName();

              if (synthEngine && synthEngine.instrumentSettings && synthEngine.instrumentSettings[activeTrack]) {
                // Save to AMP envelope or FILTER envelope based on active mode
                const paramPrefix = activeEnvelopeMode === 'filter' ? 'filter' : '';
                const capitalizedParam = param.charAt(0).toUpperCase() + param.slice(1);
                const settingKey = paramPrefix ? `${paramPrefix}${capitalizedParam}` : param;

                synthEngine.instrumentSettings[activeTrack][settingKey] = value;

                // Persist to localStorage
                if (synthEngine.saveInstrumentSettings) {
                  synthEngine.saveInstrumentSettings();
                }

                // Mark preset as dirty
                markPresetDirty();
              }
            }
          };

          const startDrag = (clientY) => {
            startY = clientY;
            startVal = parseFloat(input.value);
            min = parseFloat(input.min || 0);
            max = parseFloat(input.max || 1);
          };

          // Initialize visual only - do NOT write to engine
          updateKnobVisual(parseFloat(input.value || 0), false);

          knob.addEventListener('mousedown', (e) => {
            e.preventDefault();
            e.stopPropagation();
            startDrag(e.clientY);

            const iframeWin = getInnerWin();

            const move = (ev) => {
              const range = max - min;
              const deltaRatio = (startY - ev.clientY) / 160;
              let value = startVal + deltaRatio * range;
              value = Math.min(max, Math.max(min, value));
              const step = parseFloat(input.step || 0);
              if (step > 0) value = Math.round(value / step) * step;
              input.value = value;
              updateKnobVisual(value);

              // Sync with actual ADSR controls in left panel
              const realInput = doc.getElementById(param);
              if (realInput) {
                realInput.value = value;
                realInput.dispatchEvent(new Event('input', { bubbles: true }));
              }
            };

            const up = () => {
              document.removeEventListener('mousemove', move);
              document.removeEventListener('mouseup', up);
              if (iframeWin) {
                iframeWin.document.removeEventListener('mousemove', move);
                iframeWin.document.removeEventListener('mouseup', up);
              }
            };

            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', up);
            if (iframeWin) {
              iframeWin.document.addEventListener('mousemove', move);
              iframeWin.document.addEventListener('mouseup', up);
            }
          });
        });

        // Wire up velocity slider
        const velocitySlider = adsrPanel.querySelector(`#${prefix}-velocity`);
        const velocityValue = adsrPanel.querySelector(`#${prefix}-velocity-value`);
        const velocityFill = adsrPanel.querySelector(`#${prefix}-velocity-fill`);
        const velocityThumb = adsrPanel.querySelector(`#${prefix}-velocity-thumb`);
        if (velocitySlider && velocityValue && velocityFill && velocityThumb) {
          // Initialize from saved settings
          const synthEngine = getSynthEngine();
          const activeTrack = getCurrentTrackName();
          if (synthEngine && synthEngine.instrumentSettings && synthEngine.instrumentSettings[activeTrack]) {
            const savedVelocity = synthEngine.instrumentSettings[activeTrack].velocity || 1.0;
            const velocityPercent = Math.round(savedVelocity * 100);
            velocitySlider.value = velocityPercent;
            velocityValue.textContent = `${velocityPercent}%`;
            velocityFill.style.width = `${velocityPercent}%`;
            velocityThumb.style.left = `${velocityPercent}%`;
          }

          velocitySlider.addEventListener('input', (e) => {
            const value = parseInt(e.target.value);
            velocityValue.textContent = `${value}%`;
            // Update fill width and thumb position
            velocityFill.style.width = `${value}%`;
            velocityThumb.style.left = `${value}%`;

            // Update audio - velocity affects note volume
            const synthEngine = getSynthEngine();
            const activeTrack = getCurrentTrackName();
            if (synthEngine && synthEngine.instrumentSettings && synthEngine.instrumentSettings[activeTrack]) {
              // Store velocity as a multiplier (0-1)
              synthEngine.instrumentSettings[activeTrack].velocity = value / 100;

              // Persist to localStorage
              if (synthEngine.saveInstrumentSettings) {
                synthEngine.saveInstrumentSettings();
              }

              // Mark preset as dirty
              markPresetDirty();
            }
          });
        }

        // Get track color - define once outside handlers like FX buttons do
        const trackColor = TRACK_COLORS[currentTrackNumber];
        const color = trackColor.color;
        const colorRgb = color.replace('#', '');
        const r = parseInt(colorRgb.substr(0,2), 16);
        const g = parseInt(colorRgb.substr(2,2), 16);
        const b = parseInt(colorRgb.substr(4,2), 16);

        // Wire up AMP and FILTER buttons
        const ampBtn = adsrPanel.querySelector('.adsr-amp-btn');
        const filterBtn = adsrPanel.querySelector('.adsr-filter-btn');
        const adsrEnvButtons = [ampBtn, filterBtn];

        // Function to save current UI values to state BEFORE switching
        const saveEnvelopeFromUI = (mode) => {
          const synthEngine = getSynthEngine();
          const activeTrack = getCurrentTrackName();
          if (!synthEngine || !synthEngine.instrumentSettings || !synthEngine.instrumentSettings[activeTrack]) return;

          const settings = synthEngine.instrumentSettings[activeTrack];
          const prefix_local = prefix; // Capture prefix in closure

          ['attack', 'decay', 'sustain', 'release'].forEach(param => {
            const input = adsrPanel.querySelector(`#${prefix_local}-${param}`);
            if (input) {
              const value = parseFloat(input.value);
              if (mode === 'amp') {
                settings[param] = value;
              } else {
                const capitalizedParam = param.charAt(0).toUpperCase() + param.slice(1);
                settings[`filter${capitalizedParam}`] = value;
              }
            }
          });

          // Persist to localStorage
          if (synthEngine.saveInstrumentSettings) {
            synthEngine.saveInstrumentSettings();
          }
        };

        // Function to load envelope values into UI
        const loadEnvelopeToUI = (mode) => {
          const synthEngine = getSynthEngine();
          const activeTrack = getCurrentTrackName();

          if (!synthEngine || !synthEngine.instrumentSettings || !synthEngine.instrumentSettings[activeTrack]) return;

          const settings = synthEngine.instrumentSettings[activeTrack];

          // Initialize filter envelope params if they don't exist
          if (mode === 'filter') {
            if (settings.filterAttack === undefined) settings.filterAttack = settings.attack || 0.1;
            if (settings.filterDecay === undefined) settings.filterDecay = settings.decay || 0.2;
            if (settings.filterSustain === undefined) settings.filterSustain = settings.sustain || 0.5;
            if (settings.filterRelease === undefined) settings.filterRelease = settings.release || 0.5;
          }

          const params = mode === 'amp'
            ? { attack: settings.attack, decay: settings.decay, sustain: settings.sustain, release: settings.release }
            : { attack: settings.filterAttack, decay: settings.filterDecay, sustain: settings.filterSustain, release: settings.filterRelease };

          // Update knobs and displays - DIRECTLY update visuals without triggering input events
          ['attack', 'decay', 'sustain', 'release'].forEach(param => {
            const input = adsrPanel.querySelector(`#${prefix}-${param}`);
            const knob = adsrPanel.querySelector(`.adsr-knob-ring[data-knob="${param}"]`);
            const valueDisplay = adsrPanel.querySelector(`#${prefix}-${param}-value`);

            if (input && params[param] !== undefined) {
              const newValue = params[param];

              // Update input value WITHOUT triggering change events
              input.value = newValue;

              // Update value display
              if (valueDisplay) {
                valueDisplay.textContent = newValue.toFixed(2);
              }

              // Update knob visual position
              if (knob) {
                const minVal = parseFloat(input.min);
                const maxVal = parseFloat(input.max);
                const ratio = maxVal === minVal ? 0 : (newValue - minVal) / (maxVal - minVal);
                knob.style.setProperty('--knob-angle', `${ratio * 270}deg`);
              }
            }
          });

          // Update envelope preview
          const attackInput = adsrPanel.querySelector(`#${prefix}-attack`);
          const decayInput = adsrPanel.querySelector(`#${prefix}-decay`);
          const sustainInput = adsrPanel.querySelector(`#${prefix}-sustain`);
          const releaseInput = adsrPanel.querySelector(`#${prefix}-release`);
          const previewPath = adsrPanel.querySelector(`#${prefix}-adsr-preview-path`);
          const previewFill = adsrPanel.querySelector(`#${prefix}-adsr-preview-fill`);

          if (attackInput && decayInput && sustainInput && releaseInput && previewPath && previewFill) {
            const normalize = (inp) => {
              const min = Number(inp.min || 0);
              const max = Number(inp.max || 1);
              const value = Number(inp.value || min);
              return max === min ? 0 : (value - min) / (max - min);
            };
            const a = normalize(attackInput);
            const d = normalize(decayInput);
            const s = normalize(sustainInput);
            const r = normalize(releaseInput);
            const x1 = 8 + a * 24;
            const x2 = x1 + 12 + d * 20;
            const x3 = x2 + 18;
