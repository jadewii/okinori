            if (!synthEngine || !synthEngine.instrumentSettings || !synthEngine.instrumentSettings[activeTrack]) return;

            const settings = synthEngine.instrumentSettings[activeTrack];
            const ftPrefix = filterType.toUpperCase();

            ['cutoff', 'res', 'drive', 'track'].forEach(param => {
              const input = filterPanel.querySelector(`#${prefix}-filter-${param}`);
              if (input) {
                const value = parseFloat(input.value);
                const paramCapitalized = param.charAt(0).toUpperCase() + param.slice(1);
                settings[`filter${ftPrefix}${paramCapitalized}`] = value;
              }
            });

            // Persist to localStorage
            if (synthEngine.saveInstrumentSettings) {
              synthEngine.saveInstrumentSettings();
            }
          };

          // Function to load filter values into UI
          const loadFilterToUI = (filterType) => {
            const synthEngine = getSynthEngine();
            const activeTrack = getCurrentTrackName();
            if (!synthEngine || !synthEngine.instrumentSettings || !synthEngine.instrumentSettings[activeTrack]) return;

            const settings = synthEngine.instrumentSettings[activeTrack];

            // Initialize filter params for each type if they don't exist
            ['lp', 'hp', 'bp', 'notch'].forEach(ft => {
              ['Cutoff', 'Res', 'Drive', 'Track'].forEach(param => {
                const key = `filter${ft.toUpperCase()}${param}`;
                if (settings[key] === undefined) {
                  settings[key] = param === 'Cutoff' ? 100 : 0; // Default values
                }
              });
            });

            // Get values for the active filter type
            const ftPrefix = filterType.toUpperCase();
            const params = {
              cutoff: settings[`filter${ftPrefix}Cutoff`] || 100,
              res: settings[`filter${ftPrefix}Res`] || 0,
              drive: settings[`filter${ftPrefix}Drive`] || 0,
              track: settings[`filter${ftPrefix}Track`] || 0
            };

            // Update all knob visuals
            ['cutoff', 'res', 'drive', 'track'].forEach(param => {
              const input = filterPanel.querySelector(`#${prefix}-filter-${param}`);
              const knob = filterPanel.querySelector(`.adsr-knob-ring[data-knob="${param}"]`);
              const valueDisplay = filterPanel.querySelector(`#${prefix}-filter-${param}-value`);

              if (input && params[param] !== undefined) {
                input.value = params[param];
                if (valueDisplay) valueDisplay.textContent = Math.round(params[param]);
                if (knob) {
                  const minVal = parseFloat(input.min);
                  const maxVal = parseFloat(input.max);
                  const ratio = maxVal === minVal ? 0 : (params[param] - minVal) / (maxVal - minVal);
                  knob.style.setProperty('--knob-angle', `${ratio * 270}deg`);
                }
              }
            });
          };

          // Wire up filter type toggle buttons
          const filterTypeButtons = filterPanel.querySelectorAll('.filter-type-btn');
          filterTypeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
              const filterType = btn.dataset.type; // 'lp', 'hp', 'bp', 'notch'

              // SAVE current UI values before switching
              saveFilterFromUI(activeFilterType);

              // Update visual state
              filterTypeButtons.forEach(b => {
                b.style.border = `2px solid rgba(128,128,128,0.3)`;
                b.style.background = 'transparent';
                b.style.opacity = '0.7';
              });
              btn.style.border = `2px solid ${color}`;
              btn.style.background = `rgba(${r},${g},${b},0.2)`;
              btn.style.opacity = '1';

              // Update filter type in audio engine
              const synthEngine = getSynthEngine();
              const activeTrack = getCurrentTrackName();

              if (synthEngine && synthEngine.instrumentSettings && synthEngine.instrumentSettings[activeTrack]) {
                // Map button type to Web Audio filter type
                const filterTypeMap = {
                  'lp': 'lowpass',
                  'hp': 'highpass',
                  'bp': 'bandpass',
                  'notch': 'notch'
                };
                const audioFilterType = filterTypeMap[filterType] || 'lowpass';
                synthEngine.instrumentSettings[activeTrack].filterType = audioFilterType;

                // Update filter node in real-time
                if (synthEngine.trackFilters && synthEngine.trackFilters[activeTrack]) {
                  const filterNode = synthEngine.trackFilters[activeTrack];
                  filterNode.type = audioFilterType;
                }
              }

              // Switch filter type and load values
              activeFilterType = filterType;
              loadFilterToUI(filterType);
            });
          });

          // Wire up FILTER knobs (Cutoff, Res, Drive, Track)
          const filterKnobs = filterPanel.querySelectorAll('.adsr-knob-ring');
          filterKnobs.forEach(knob => {
            const param = knob.dataset.knob;
            const input = filterPanel.querySelector(`#${prefix}-filter-${param}`);
            const valueDisplay = filterPanel.querySelector(`#${prefix}-filter-${param}-value`);

            if (!input || !valueDisplay) return;

            let startY = 0, startVal = 0, min = 0, max = 1;

            const updateKnobVisual = (value, writeToEngine = true) => {
              const minVal = parseFloat(input.min);
              const maxVal = parseFloat(input.max);
              const ratio = maxVal === minVal ? 0 : (value - minVal) / (maxVal - minVal);
              knob.style.setProperty('--knob-angle', `${ratio * 270}deg`);
              valueDisplay.textContent = Math.round(value);

              // Only write to engine if explicitly requested (not during initialization)
              if (writeToEngine) {
                const synthEngine = getSynthEngine();
                const activeTrack = getCurrentTrackName();

                if (synthEngine && synthEngine.instrumentSettings && synthEngine.instrumentSettings[activeTrack]) {
                  // Save to correct filter type
                  const ftPrefix = activeFilterType.toUpperCase();
                  const paramCapitalized = param.charAt(0).toUpperCase() + param.slice(1);
                  const settingKey = `filter${ftPrefix}${paramCapitalized}`;
                  synthEngine.instrumentSettings[activeTrack][settingKey] = value;

                  if (param === 'cutoff') {
                    // Map 10-100 to frequency range: ~63Hz - 20000Hz (logarithmic, prevents silence)
                    const freqValue = 20 * Math.pow(1000, value / 100);
                    synthEngine.instrumentSettings[activeTrack].filterCutoff = freqValue;
                    // Update filter node in real-time
                    if (synthEngine.trackFilters && synthEngine.trackFilters[activeTrack] && synthEngine.audioContext) {
                      const filterNode = synthEngine.trackFilters[activeTrack];
                      const now = synthEngine.audioContext.currentTime;
                      try {
                        filterNode.frequency.cancelScheduledValues(now);
                        filterNode.frequency.setTargetAtTime(freqValue, now, 0.01);
                      } catch(e) {
                        filterNode.frequency.value = freqValue;
                      }
                    }
                  } else if (param === 'res') {
                    // Map 0-100 to Q range: 0.1 - 30
                    const qValue = 0.1 + (value / 100) * 29.9;
                    synthEngine.instrumentSettings[activeTrack].filterRes = qValue;
                    // Update filter node in real-time
                    if (synthEngine.trackFilters && synthEngine.trackFilters[activeTrack] && synthEngine.audioContext) {
                      const filterNode = synthEngine.trackFilters[activeTrack];
                      const now = synthEngine.audioContext.currentTime;
                      try {
                        filterNode.Q.cancelScheduledValues(now);
                        filterNode.Q.setTargetAtTime(qValue, now, 0.01);
                      } catch(e) {
                        filterNode.Q.value = qValue;
                      }
                    }
                  } else if (param === 'drive') {
                    synthEngine.instrumentSettings[activeTrack].filterDrive = value;
                    // Note: Drive would require a WaveShaperNode, not implemented yet
                  } else if (param === 'track') {
                    synthEngine.instrumentSettings[activeTrack].filterTrack = value;
                    // Note: Track would modulate cutoff based on note pitch
                  }

                  // Persist to localStorage
                  if (synthEngine.saveInstrumentSettings) {
                    synthEngine.saveInstrumentSettings();
                  }

                  // Mark preset as dirty
                  markPresetDirty();
                }
              }
            };

            const startDrag = (clientY) => {
              startY = clientY;
              startVal = parseFloat(input.value);
            };

            // Initialize from saved settings instead of hardcoded default
            const synthEngine = getSynthEngine();
            const activeTrack = getCurrentTrackName();
            let initialValue = parseFloat(input.value || 0);

            if (synthEngine && synthEngine.instrumentSettings && synthEngine.instrumentSettings[activeTrack]) {
              const settings = synthEngine.instrumentSettings[activeTrack];

              // Get the UI value from the stored frequency/Q values
              if (param === 'cutoff' && settings.filterCutoff !== undefined) {
                // Reverse the logarithmic mapping: freq = 20 * 1000^(value/100)
                // So: value = 100 * log(freq/20) / log(1000)
                initialValue = 100 * Math.log(settings.filterCutoff / 20) / Math.log(1000);
                initialValue = Math.max(10, Math.min(100, initialValue)); // Clamp to 10-100
              } else if (param === 'res' && settings.filterRes !== undefined) {
                // Reverse the Q mapping: Q = 0.1 + (value/100) * 29.9
                // So: value = (Q - 0.1) * 100 / 29.9
                initialValue = (settings.filterRes - 0.1) * 100 / 29.9;
                initialValue = Math.max(0, Math.min(100, initialValue)); // Clamp to 0-100
              } else if (param === 'drive' && settings.filterDrive !== undefined) {
                initialValue = settings.filterDrive;
              } else if (param === 'track' && settings.filterTrack !== undefined) {
                initialValue = settings.filterTrack;
              }
              input.value = initialValue;
            }

            // Initialize visual only - do NOT write to engine
            updateKnobVisual(initialValue, false);

            knob.addEventListener('mousedown', (e) => {
              e.preventDefault();
              e.stopPropagation();
              startDrag(e.clientY);

              const iframeWin = getInnerWin();
              const min = parseFloat(input.min || 0);
              const max = parseFloat(input.max || 100);

              const move = (ev) => {
                const range = max - min;
                const deltaRatio = (startY - ev.clientY) / 160;
                let value = startVal + deltaRatio * range;
                value = Math.min(max, Math.max(min, value));
                const step = parseFloat(input.step || 1);
                if (step > 0) value = Math.round(value / step) * step;
                input.value = value;
                updateKnobVisual(value);
              };

              const up = () => {
                document.removeEventListener('mousemove', move);
                document.removeEventListener('mouseup', up);
                if (iframeWin) {
                  iframeWin.document.removeEventListener('mousemove', move);
                  iframeWin.document.removeEventListener('mouseup', up);
                }
              };

              document.addEventListener('mousemove', move);
              document.addEventListener('mouseup', up);
              if (iframeWin) {
                iframeWin.document.addEventListener('mousemove', move);
                iframeWin.document.addEventListener('mouseup', up);
              }
            });
          });

          // Initialize filter type button states from saved settings
          const synthEngine = getSynthEngine();
          const activeTrack = getCurrentTrackName();
          if (synthEngine && synthEngine.instrumentSettings && synthEngine.instrumentSettings[activeTrack]) {
            const settings = synthEngine.instrumentSettings[activeTrack];
            const savedFilterType = settings.filterType || 'lowpass';

            // Map Web Audio type to UI button type
            const reverseFilterTypeMap = {
              'lowpass': 'lp',
              'highpass': 'hp',
              'bandpass': 'bp',
              'notch': 'notch'
            };
            activeFilterType = reverseFilterTypeMap[savedFilterType] || 'lp';

            // Update button visual states to match saved type
            filterTypeButtons.forEach(btn => {
              if (btn.dataset.type === activeFilterType) {
                btn.style.border = `2px solid ${color}`;
                btn.style.background = `rgba(${r},${g},${b},0.2)`;
                btn.style.opacity = '1';
              } else {
                btn.style.border = `2px solid rgba(128,128,128,0.3)`;
                btn.style.background = 'transparent';
                btn.style.opacity = '0.7';
              }
            });
          }

          // Load initial values from saved settings
          loadFilterToUI(activeFilterType);
        }
      }
    }

    function showStatus(message) {
      statusPill.textContent = message;
      statusPill.style.display = 'block';
      clearTimeout(showStatus.timer);
      showStatus.timer = setTimeout(() => statusPill.style.display = 'none', 1800);
    }

    function getInnerWin() {
      try { return frame.contentWindow; } catch { return null; }
    }
    function getInnerDoc() {
      try { return frame.contentDocument || frame.contentWindow.document; } catch { return null; }
    }
    function q(id) { return getInnerDoc()?.getElementById(id); }
    function clickInner(id) { const el = q(id); if (el) el.click(); }

    // Helper functions for dynamic track access in EDIT mode
    function getSynthEngine() {
      const win = getInnerWin();
      if (!win) return null;
      return win.synthEngine || null;
    }

    function getCurrentTrackName() {
      return currentTrack;
    }

    function getCurrentTrackAnalyser() {
      const engine = getSynthEngine();
      if (!engine || !engine.analysers) return null;
      // Try current track first, then fall back to any analyser to test
      return engine.analysers[currentTrack] || engine.analysers.synth || engine.analysers.bass || engine.analysers.keys || engine.analysers.lead || null;
    }

    function renderScalePanel() {
      scalePanel.innerHTML = '';
      for (const [value, label] of SCALES) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'dropdown-item';
        btn.dataset.value = value;
        btn.textContent = label;
        btn.addEventListener('click', () => setScale(value));
        scalePanel.appendChild(btn);
      }
    }


    function renderWaves() {
      waveRow.innerHTML = '';
      for (const [track, , svg] of TRACKS) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'wave-btn';
        btn.dataset.track = track;
        btn.innerHTML = `<svg viewBox="0 0 42 30" aria-hidden="true">${svg}</svg>`;
        btn.addEventListener('click', () => setTrack(track));
        waveRow.appendChild(btn);
      }
    }

    function renderSettings() {
      settingsPanel.innerHTML = '';
      const actions = [
        ['EXPORT MIDI', () => frame.contentWindow?.postMessage({ type: 'jamnutz:export-midi' }, '*')],
        ['EXPORT AUDIO', () => frame.contentWindow?.postMessage({ type: 'jamnutz:export-audio' }, '*')]
      ];
      for (const [label, handler] of actions) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'dropdown-item';
        btn.textContent = label;
        btn.addEventListener('click', () => {
          settingsDropdown.classList.remove('open');
          handler();
        });
        settingsPanel.appendChild(btn);
      }
    }

    function syncInnerActiveInstrumentButtons(track) {
      const doc = getInnerDoc();
      const win = getInnerWin();
      if (!doc) return;
      const id = `instrument-${track}`;
      const engine = win?.sequencer?.synthEngine || win?.keyboard?.synthEngine || win?.synthEngine;
      doc.querySelectorAll('.instrument-button').forEach(btn => btn.classList.toggle('active', btn.id === id));
      doc.querySelectorAll('.key').forEach(key => key.classList.remove('synth', 'bass', 'keys', 'lead', 'pad', 'fx'));
      if (engine?.setInstrument) engine.setInstrument(track);
      if (engine) engine.currentInstrument = track;
      if (win?.keyboard?.synthEngine) win.keyboard.synthEngine.currentInstrument = track;
      if (win?.sequencer?.synthEngine) win.sequencer.synthEngine.currentInstrument = track;
      if (win?.sequencer) {
        win.sequencer.currentInstrument = track;
        if (win.sequencer.setCurrentInstrument) win.sequencer.setCurrentInstrument(track);
      }
    }

    function getTrackColor(track) {
      return { synth: '#ff385c', bass: '#1bdb74', keys: '#ff9d00', lead: '#8a46ff' }[track] || '#111';
    }

    function shiftTrackOctave(direction) {
      const win = getInnerWin();
      if (!win?.sequencer?.shiftSequenceOctave) return;
      win.sequencer.shiftSequenceOctave(direction, currentTrack);
      // Only recreate grid if in grid mode
      if (mainSurfaceMode === 'grid' && win.sequencer.grid?.createGrid) {
        win.sequencer.grid.createGrid();
      }
      updatePatternPanel();
    }

    function ensurePatternSlots(win, count = 8) {
      const memory = win?.sequencer?.memory;
      if (!memory) return;
      while ((memory.patternMemory?.length || 0) < count) {
        memory.patternMemory.push({
          synth: null,
          bass: null,
          keys: null,
          lead: null,
          pad: null,
          fx: null,
          octaveOffsets: null,
          directions: null,
          pendulumReverse: null
        });
      }
    }

    function buildPatternPanel() {
      const doc = getInnerDoc();
      const win = getInnerWin();
      if (!doc || !win) return;
      ensurePatternSlots(win, 8);
      let panel = doc.getElementById('jamnutz-pattern-panel');
      if (!panel) {
        panel = doc.createElement('div');
        panel.className = 'pattern-mini-panel';
        panel.id = 'jamnutz-pattern-panel';
      }
      const keyboard = doc.getElementById('keyboard');
      const sequencerSection = doc.querySelector('.sequencer-section');
      const oscillatorSection = doc.querySelector('.oscillator-section');
      const row = doc.getElementById('jamnutz-keyboard-row');
      if (!keyboard || !sequencerSection || !oscillatorSection) return;
      if (row?.parentNode) row.remove();
      if (keyboard.parentNode !== sequencerSection) {
        sequencerSection.appendChild(keyboard);
      }
      if (panel.parentNode !== oscillatorSection) {
        oscillatorSection.appendChild(panel);
      }
      updatePatternPanel();
    }

    function applyPointerTrackClass(key) {
      if (!key) return;
      key.classList.remove('synth', 'bass', 'keys', 'lead', 'pad', 'fx');
      key.classList.add(currentTrack);
    }

    function clearPointerTrackClass(key) {
      if (!key) return;
      key.classList.remove('synth', 'bass', 'keys', 'lead', 'pad', 'fx');
    }

    function wirePointerKeyColors() {
      const doc = getInnerDoc();
      const keyboard = doc?.getElementById('keyboard');
      if (!keyboard || keyboard.dataset.jamnutzPointerColors === '1') return;
      keyboard.dataset.jamnutzPointerColors = '1';

      const findKey = (target) => target?.closest?.('.key');
      const releaseAll = () => keyboard.querySelectorAll('.key').forEach(clearPointerTrackClass);

      keyboard.addEventListener('mousedown', (event) => {
        const key = findKey(event.target);
        if (!key) return;
        applyPointerTrackClass(key);
      }, true);
      keyboard.addEventListener('touchstart', (event) => {
        const key = findKey(event.target);
        if (!key) return;
        applyPointerTrackClass(key);
      }, true);
      keyboard.addEventListener('mouseup', (event) => {
        const key = findKey(event.target);
        clearPointerTrackClass(key);
      }, true);
      keyboard.addEventListener('mouseleave', () => {
        releaseAll();
      }, true);
      keyboard.addEventListener('touchend', () => {
        releaseAll();
      }, true);
      keyboard.addEventListener('touchcancel', () => {
        releaseAll();
      }, true);
    }

    function appendModuleTabs(adsrFooter) {
      const doc = getInnerDoc();
      if (!doc || !adsrFooter) return;
      // Hide ADSR footer since we have sticky buttons now
      adsrFooter.style.display = 'none';
    }

    // PRESET SYSTEM - Per-track preset storage (12 slots per track)
    function loadPresetsFromStorage() {
      try {
        const saved = localStorage.getItem('jamnutz-presets');
        if (saved) {
          const parsed = JSON.parse(saved);
          return {
            slots: parsed.slots || { synth: Array(12).fill(null), bass: Array(12).fill(null), keys: Array(12).fill(null), lead: Array(12).fill(null) },
            active: parsed.active || { synth: null, bass: null, keys: null, lead: null },
            dirty: parsed.dirty || { synth: false, bass: false, keys: false, lead: false }
          };
        }
      } catch (e) {
        console.error('Failed to load presets:', e);
      }
      return {
        slots: { synth: Array(12).fill(null), bass: Array(12).fill(null), keys: Array(12).fill(null), lead: Array(12).fill(null) },
        active: { synth: null, bass: null, keys: null, lead: null },
        dirty: { synth: false, bass: false, keys: false, lead: false }
      };
    }

    function savePresetsToStorage() {
      try {
        localStorage.setItem('jamnutz-presets', JSON.stringify({
          slots: presetSlots,
          active: activePresetSlot,
          dirty: presetDirty
        }));
      } catch (e) {
        console.error('Failed to save presets:', e);
      }
    }

    const loaded = loadPresetsFromStorage();
    const presetSlots = loaded.slots;
    const activePresetSlot = loaded.active;
    const presetDirty = loaded.dirty;

    // Track double-click for save behavior
    let lastClickTime = 0;
    let lastClickedSlot = null;

    // Global pattern/preset delete mode state
    let globalPatternMode = 'normal'; // 'normal', 'dup', 'clear'

    function captureCurrentPreset() {
      const win = getInnerWin();
      if (!win || !win.synthEngine) return null;

      const trackName = getCurrentTrackName();
      const settings = win.synthEngine.instrumentSettings[trackName];
      if (!settings) return null;

      // Deep clone to avoid reference issues
      return structuredClone(settings);
    }

    function loadPreset(presetData, trackKey) {
      const win = getInnerWin();
      if (!win || !win.synthEngine || !presetData) return;

      // Clear dirty flag
      presetDirty[trackKey] = false;

      // DO NOT replace object - update in place to preserve references
      Object.assign(
        win.synthEngine.instrumentSettings[trackKey],
        structuredClone(presetData)
      );

      // Apply settings to live audio engine immediately (affects sound)
      applyTrackSettingsToEngine(trackKey);

      // Refresh edit UI if in edit mode (updates knobs/sliders to show loaded values)
      if (mainSurfaceMode === 'edit') {
        renderEditView();
      }

      // Update only the visual state of preset slots without rebuilding
      updatePresetSlotStyles();
    }

    function applyTrackSettingsToEngine(trackKey) {
      const win = getInnerWin();
      if (!win || !win.synthEngine) return;

      const settings = win.synthEngine.instrumentSettings[trackKey];
      if (!settings) return;

      // Apply filter settings to audio nodes
      if (win.synthEngine.trackFilters && win.synthEngine.trackFilters[trackKey]) {
        const filterNode = win.synthEngine.trackFilters[trackKey];
        const now = win.synthEngine.audioContext.currentTime;

        if (settings.filterCutoff !== undefined) {
          try {
            filterNode.frequency.cancelScheduledValues(now);
            filterNode.frequency.setTargetAtTime(settings.filterCutoff, now, 0.01);
          } catch(e) {
            filterNode.frequency.value = settings.filterCutoff;
          }
        }

        if (settings.filterRes !== undefined) {
          try {
            filterNode.Q.cancelScheduledValues(now);
            filterNode.Q.setTargetAtTime(settings.filterRes, now, 0.01);
          } catch(e) {
            filterNode.Q.value = settings.filterRes;
          }
        }

        if (settings.filterType) {
          filterNode.type = settings.filterType;
        }
      }

      // Apply pan settings
      if (win.synthEngine.trackPanners && win.synthEngine.trackPanners[trackKey]) {
        const panNode = win.synthEngine.trackPanners[trackKey];
        const now = win.synthEngine.audioContext.currentTime;

        if (settings.pan !== undefined) {
          try {
            panNode.pan.cancelScheduledValues(now);
            panNode.pan.setTargetAtTime(settings.pan, now, 0.01);
          } catch(e) {
            panNode.pan.value = settings.pan;
          }
        }
      }

      // Apply volume settings
      if (win.synthEngine.trackGains && win.synthEngine.trackGains[trackKey]) {
        const gainNode = win.synthEngine.trackGains[trackKey];
        const now = win.synthEngine.audioContext.currentTime;

        if (settings.volume !== undefined) {
          try {
            gainNode.gain.cancelScheduledValues(now);
            gainNode.gain.setTargetAtTime(settings.volume, now, 0.01);
          } catch(e) {
            gainNode.gain.value = settings.volume;
          }
        }
      }
    }

    // Persistent hold-to-delete tracking (survives across renders)
    let holdTimeouts = new Map();
    let isHolding = new Map();
    let presetPanelInitialized = false;

    function updatePatternPanel() {
      const doc = getInnerDoc();
      const win = getInnerWin();
      const panel = doc?.getElementById('jamnutz-pattern-panel');
      const adsrFooter = doc?.querySelector('.adsr-footer');
      if (!doc || !win || !panel) return;

      // Add module tabs to ADSR footer
      if (adsrFooter) {
        appendModuleTabs(adsrFooter);
      }

      // Only create preset grid once, then just update styles
      if (!presetPanelInitialized || panel.querySelector('.preset-grid') === null) {
        initializePresetPanel(panel, doc);
        presetPanelInitialized = true;
      }

      // Update the visual state of all slots
      updatePresetSlotStyles();
    }

    function initializePresetPanel(panel, doc) {
      // Clear and add preset grid to panel
      panel.innerHTML = '';
      const presetGrid = doc.createElement('div');
      presetGrid.className = 'preset-grid';
      presetGrid.dataset.jamnutzPresetGrid = '1';

      // Create 12 preset slots (4x3 grid) - these persist
      for (let i = 0; i < 12; i++) {
        const slot = doc.createElement('div');
        slot.className = 'preset-slot';
        slot.dataset.slotIndex = i;
        slot.style.cssText = `
          border-radius: 50%;
          cursor: pointer;
          box-sizing: border-box;
        `;
        presetGrid.appendChild(slot);
      }

      panel.appendChild(presetGrid);

      // Set up event listeners ONCE - they persist
      // Removed hold-to-delete - now use X button mode instead
      presetGrid.addEventListener('click', (e) => {
        const slot = e.target.closest('.preset-slot');
        if (slot) {
          const slotIndex = parseInt(slot.dataset.slotIndex);
          handlePresetSlotClick(slotIndex);
        }
      });
    }

    // Old hold-to-delete handlers removed - now using X button mode

    // Track source preset for DUP mode
    let sourcePresetForDup = null;
    // Track preset pending deletion (requires second click to confirm)
    let presetPendingDelete = null;

    function handlePresetSlotClick(slotIndex) {
      const trackKey = getCurrentTrackName();
      const isFilled = presetSlots[trackKey][slotIndex] !== null;
      const isActive = activePresetSlot[trackKey] === slotIndex;

      // Check if we're in clear/delete mode
      if (globalPatternMode === 'clear') {
        // Delete mode - requires two clicks
        if (presetPendingDelete === slotIndex) {
          // Second click - actually delete
          if (isFilled) {
            presetSlots[trackKey][slotIndex] = null;
            if (isActive) {
              activePresetSlot[trackKey] = null;
              presetDirty[trackKey] = false;
            }
            savePresetsToStorage();
          }
          presetPendingDelete = null;
          updatePresetSlotStyles();
        } else {
          // First click - mark for deletion (show outline warning)
          if (isFilled) {
            presetPendingDelete = slotIndex;
            updatePresetSlotStyles();
          }
        }
        return;
      }

      // Check if we're in DUP mode
      if (globalPatternMode === 'dup') {
        if (sourcePresetForDup === null) {
          // First click - select source preset to copy from
          if (isFilled) {
            sourcePresetForDup = slotIndex;
            updatePresetSlotStyles();
          }
        } else {
          // Second click - copy source to target
          const sourceData = presetSlots[trackKey][sourcePresetForDup];
          if (sourceData) {
            // Deep clone the preset data
            presetSlots[trackKey][slotIndex] = structuredClone(sourceData);
            activePresetSlot[trackKey] = slotIndex;
            savePresetsToStorage();
            updatePresetSlotStyles();
            // Exit dup mode by resetting source
            sourcePresetForDup = null;
          }
        }
        return;
      }

      // Normal mode behavior
      sourcePresetForDup = null; // Reset if we're not in dup mode

      if (!isFilled) {
        // Empty slot - two-click behavior (not double-click)
        if (isActive) {
          // Second click on already active empty slot - save preset
          const preset = captureCurrentPreset();
          if (preset) {
            presetSlots[trackKey][slotIndex] = preset;
            activePresetSlot[trackKey] = slotIndex;
            presetDirty[trackKey] = false;
            savePresetsToStorage();
            updatePresetSlotStyles();
          }
        } else {
          // First click on empty - just select it (show thick outline)
          activePresetSlot[trackKey] = slotIndex;
          updatePresetSlotStyles();
        }
      } else {
        // Filled slot - load preset
        const preset = presetSlots[trackKey][slotIndex];
        if (preset) {
          activePresetSlot[trackKey] = slotIndex;
          savePresetsToStorage();
          updatePresetSlotStyles();
          loadPreset(preset, trackKey);
        }
      }
    }

    function updatePresetSlotStyles() {
      const doc = getInnerDoc();
      const presetGrid = doc?.querySelector('.preset-grid[data-jamnutz-preset-grid="1"]');
      if (!presetGrid) return;

      const trackKey = getCurrentTrackName();
      const trackColor = TRACK_COLORS[currentTrackNumber];
      const colorRgb = trackColor.color.replace('#', '');
      const r = parseInt(colorRgb.substr(0,2), 16);
      const g = parseInt(colorRgb.substr(2,2), 16);
      const b = parseInt(colorRgb.substr(4,2), 16);
      const lightFill = `rgba(${r},${g},${b},0.2)`;

      const slots = presetGrid.querySelectorAll('.preset-slot');
      const inClearMode = globalPatternMode === 'clear';
      const inDupMode = globalPatternMode === 'dup';

      slots.forEach((slot, i) => {
        const isFilled = presetSlots[trackKey][i] !== null;
        const isActive = activePresetSlot[trackKey] === i;

        // Clear existing X symbols
        slot.innerHTML = '';

        // Clear/delete mode - show X only on filled presets, thick outline on pending delete
        if (inClearMode) {
          const isPendingDelete = presetPendingDelete === i;

          // Only filled presets get X symbol in clear mode
          if (isFilled) {
            const xSymbol = doc.createElement('div');
            xSymbol.style.cssText = `
              position: absolute;
              top: 50%;
              left: 50%;
              transform: translate(-50%, -50%);
              color: ${trackColor.color};
              font: 700 11px/1 "Space Mono", monospace;
              pointer-events: none;
            `;
            xSymbol.textContent = 'X';
            slot.appendChild(xSymbol);

            if (isPendingDelete) {
              // Pending deletion - thick outline to warn
              slot.style.border = `4px solid ${trackColor.color}`;
              slot.style.background = lightFill;
            } else {
              // Filled presets - normal outline
              slot.style.border = `2px solid ${trackColor.color}`;
              slot.style.background = lightFill;
            }
          } else {
            // Empty presets - normal outline, no X
            slot.style.border = `2px solid ${trackColor.color}`;
            slot.style.background = 'transparent';
          }
          return;
        }

        // DUP mode - source is fully lit, others pulse when source selected
        if (inDupMode) {
          const isSource = sourcePresetForDup === i;

          if (isSource) {
            // Source preset - fully lit to match pattern behavior
            slot.style.border = `2px solid ${trackColor.color}`;
            slot.style.background = trackColor.color;
            slot.classList.remove('pulse-dup');
          } else {
            // Other presets - dashed outline
            slot.style.border = `2px dashed ${trackColor.color}`;
            if (isFilled) {
              slot.style.background = lightFill;
            } else {
              slot.style.background = 'transparent';
            }
            // Pulse when source is selected
            if (sourcePresetForDup !== null) {
              slot.classList.add('pulse-dup');
            } else {
              slot.classList.remove('pulse-dup');
            }
          }
          return;
        }

        // Remove pulse class in non-DUP modes
        slot.classList.remove('pulse-dup');

        // Normal mode visual states:
        // - Active + filled = full color fill
        // - Active + empty = thick outline (ready to receive data)
        // - Not active + filled = dim fill
        // - Not active + empty = normal outline

        if (isActive && isFilled) {
          // Selected preset with data = full fill
          slot.style.border = `2px solid ${trackColor.color}`;
          slot.style.background = trackColor.color;
        } else if (isActive && !isFilled) {
          // Active empty preset = thick outline to show it's ready to receive data
          slot.style.border = `4px solid ${trackColor.color}`;
          slot.style.background = 'transparent';
        } else if (isFilled) {
          // Has data but not selected = dim fill
          slot.style.border = `2px solid ${trackColor.color}`;
          slot.style.background = lightFill;
        } else {
          // Not active + empty = normal outline
          slot.style.border = `2px solid ${trackColor.color}`;
          slot.style.background = 'transparent';
        }
      });
    }

    // Mark preset as dirty when settings change
    function markPresetDirty() {
      const trackKey = getCurrentTrackName();
      if (activePresetSlot[trackKey] !== null) {
        presetDirty[trackKey] = true;
        savePresetsToStorage(); // Persist dirty state
      }
    }

    function shouldForwardKey(event) {
      const target = event.target;
      if (!target) return true;
      const tag = target.tagName;
      if (target.isContentEditable) return false;
      return !['INPUT', 'TEXTAREA', 'SELECT', 'BUTTON'].includes(tag);
    }

    function forwardKeyboardEvent(type, event) {
      const win = getInnerWin();
      if (!win || !shouldForwardKey(event)) return;
      const musicalKeys = new Set(["z","x","c","v","b","n","m",",",".","/","a","s","d","f","g","h","j","k","l",";","'","q","w","e","r","t","y","u","i","o","p","[","]","\\","1","2"]);
      const key = (event.key || '').toLowerCase();
      if (!musicalKeys.has(key)) return;
      event.preventDefault();
      setTrack(currentTrack);

      // Don't focus iframe during step recording - parent needs to receive spacebar
      if (recordMode !== 'step') {
        try { win.focus(); } catch {}
      }
      const forwarded = new KeyboardEvent(type, {
        key: event.key,
        code: event.code,
        location: event.location,
        repeat: event.repeat,
        shiftKey: event.shiftKey,
        ctrlKey: event.ctrlKey,
        altKey: event.altKey,
        metaKey: event.metaKey,
        bubbles: true,
        cancelable: true
      });
      win.dispatchEvent(forwarded);
    }


    function updateModuleAccent(track) {
      const doc = getInnerDoc();
      if (!doc) return;
      const map = { synth: 'module-red', bass: 'module-green', keys: 'module-orange', lead: 'module-purple' };
      const view = doc.getElementById('module-view');
      if (!view) return;
      const activeTab = doc.querySelector('.module-tab.is-active')?.dataset.module;
      if (activeTab === 'adsr') {
        view.classList.remove('module-red', 'module-green', 'module-orange', 'module-purple');
        view.classList.add(map[track] || 'module-purple');
      }
    }

    function setTrack(track) {
      currentTrack = track;

      // Map track name to track number for color system
      const trackMap = { 'synth': 1, 'bass': 2, 'keys': 3, 'lead': 4 };
      const trackNum = trackMap[track];
      if (trackNum) {
        setActiveTrack(trackNum);
      }

      // Update playhead color to match track
      const trackColor = TRACK_COLORS[currentTrackNumber].color;
      document.documentElement.style.setProperty('--current-track-color', trackColor);

      // Update all topbar buttons and text to use track color
      const topbar = document.querySelector('.topbar');
      if (topbar) {
        // Update topbar border
        topbar.style.borderBottomColor = trackColor;

        // Update app name
        const appName = topbar.querySelector('.app-name');
        if (appName) appName.style.color = trackColor;

        // Update all header buttons with track color
        applyTrackColorToButtons();

        // Update tempo wrap border
        const tempoWrap = topbar.querySelector('.tempo-wrap');
        if (tempoWrap) tempoWrap.style.borderColor = trackColor;

        // Update tempo label and value
        const tempoLabel = topbar.querySelector('.mini-label');
        if (tempoLabel) {
          tempoLabel.style.color = trackColor;
          tempoLabel.style.borderColor = trackColor;
        }
        const tempoValue = topbar.querySelector('.tempo-value');
        if (tempoValue) tempoValue.style.color = trackColor;

        // Update BPM slider
        const tempoControl = topbar.querySelector('#tempo-control');
        if (tempoControl) {
          tempoControl.style.setProperty('--slider-color', trackColor);
        }

        // Update scale dropdown
        const scaleDropdown = topbar.querySelector('.dropdown-trigger');
        if (scaleDropdown) {
          scaleDropdown.style.borderColor = trackColor;
          scaleDropdown.style.color = trackColor;
          scaleDropdown.style.background = 'transparent';
        }

        // Update scale dropdown arrow (caret)
        const caret = scaleDropdown?.querySelector('.caret');
        if (caret) {
          caret.style.borderRightColor = trackColor;
          caret.style.borderBottomColor = trackColor;
        }

        // Update scale panel items
        const scalePanel = document.getElementById('scale-panel');
        if (scalePanel) {
          scalePanel.style.borderColor = trackColor;
          scalePanel.querySelectorAll('.dropdown-item').forEach(item => {
            item.style.color = trackColor;
          });
        }

        // Update wave button outlines (but keep their colored backgrounds)
        topbar.querySelectorAll('.wave-btn').forEach(btn => {
          btn.style.borderColor = trackColor;
        });
      }

      const win = getInnerWin();
      const engine = win?.sequencer?.synthEngine || win?.keyboard?.synthEngine || win?.synthEngine;
      if (engine?.setInstrument) engine.setInstrument(track);
      if (engine) engine.currentInstrument = track;
      if (win?.keyboard?.synthEngine) win.keyboard.synthEngine.currentInstrument = track;
      if (win?.sequencer) {
        win.sequencer.currentInstrument = track;
        if (win.sequencer.setCurrentInstrument) win.sequencer.setCurrentInstrument(track);
      }
      syncInnerActiveInstrumentButtons(track);
      // Only recreate grid if in grid mode
      if (mainSurfaceMode === 'grid' && win?.sequencer?.grid?.createGrid) {
        win.sequencer.grid.createGrid();
      }
      updateWaveState();
      updateModuleAccent(track);
      updatePatternPanel();
      try { win?.focus?.(); } catch {}
    }

    function updateWaveState() {
      document.querySelectorAll('.wave-btn').forEach(btn => btn.classList.toggle('is-active', btn.dataset.track === currentTrack));
    }

    function setScale(value) {
      const innerWin = getInnerWin();
      if (!innerWin?.keyboard) return;
      innerWin.keyboard.currentScale = value;
      scaleCurrent.textContent = SCALES.find(([key]) => key === value)?.[1] || value.toUpperCase();
      scaleDropdown.classList.remove('open');
      const win = getInnerWin();
      // Only recreate grid if in grid mode
      if (mainSurfaceMode === 'grid' && win?.sequencer?.grid?.createGrid) {
        win.sequencer.grid.createGrid();
      }
      syncScaleSelection();
    }

    function syncScaleSelection() {
      document.querySelectorAll('.dropdown-item').forEach(item => {
        item.classList.toggle('is-active', item.dataset.value === getInnerWin()?.keyboard?.currentScale);

    function setPlayingState(isPlaying) {
      console.log('setPlayingState called:', isPlaying);
      lastKnownPlaying = !!isPlaying;
      playToggle.textContent = isPlaying ? 'STOP' : 'PLAY';
      playToggle.classList.toggle('is-active', !!isPlaying);

      // Reapply track color styling to respect new active state
      applyTrackColorToButtons();

      if (!isPlaying) {
        resetClearMode();
        stopPlayhead();
      } else {
        startPlayhead();
      }
    }

    function startPlayhead() {
      if (playheadAnimationFrame) {
        cancelAnimationFrame(playheadAnimationFrame);
      }

      animatePlayhead();
    }

    function animatePlayhead() {
      const win = getInnerWin();
      if (!win?.sequencer) {
        playheadAnimationFrame = requestAnimationFrame(animatePlayhead);
        return;
      }

      let progress = 0;
      let currentStep = 0;

      if (win.sequencer.sequencerRunning && win.sequencer.synthEngine?.audioContext) {
        const audioTime = win.sequencer.synthEngine.audioContext.currentTime;
        const stepFloat = win.sequencer.getPlayheadStepFloat(audioTime);
        currentStep = Math.floor(stepFloat) % 32;

        // Reaches 100% when step 31 begins
        const displayStep = Math.min(stepFloat, 31);
        progress = displayStep / 31;
      }

      // Simple rule: if STP mode is active, show step indicators. Otherwise show normal playhead.
      if (stepModeActive) {
        playheadBar.classList.add('hidden');
        animateStepIndicators(currentStep);
      } else {
        playheadBar.classList.remove('hidden');
        playheadBar.style.width = `${progress * 100}%`;
      }

      playheadAnimationFrame = requestAnimationFrame(animatePlayhead);
    }

    function stopPlayhead() {
      if (playheadAnimationFrame) {
        cancelAnimationFrame(playheadAnimationFrame);
        playheadAnimationFrame = null;
      }
      playheadBar.style.width = '0%';
    }

    function clearCurrentTrack() {
      const win = getInnerWin();
      if (!win?.sequencer?.sequencerTracks) return;

      // Clear sequencer track data
      if (win.sequencer.sequencerTracks[currentTrack]) {
        win.sequencer.sequencerTracks[currentTrack] = Array(384).fill(0);

      // Refresh grid
      if (win.sequencer.grid?.createGrid) {
        win.sequencer.grid.createGrid();

      // Update step indicators to show cleared state
      updateStepIndicators();

      showStatus('TRACK CLEARED');

      trackNames.forEach(track => {

      // Refresh grid
      if (win.sequencer.grid?.createGrid) {
        win.sequencer.grid.createGrid();

      // Update step indicators
      updateStepIndicators();

      showStatus('ALL TRACKS CLEARED');
    }

      function createCircularKnob(label, value = 50, min = 0, max = 100, readout = '') {
        const ratio = (value - min) / (max - min);
        const circumference = 2 * Math.PI * 28;
        // Arc range: 270° (from 135° to 405°, which is 135° to 45° going clockwise)
        const arcLength = circumference * (270 / 360); // 75% of full circle
        const valueArcLength = arcLength * ratio;
        const valueDashOffset = arcLength - valueArcLength;

        return `
          <div class="module-card">
            <div class="module-label">${label}</div>
            <div class="module-knob-wrap" data-value="${value}" data-min="${min}" data-max="${max}">
              <svg class="module-knob-svg" viewBox="0 0 64 64" style="transform: rotate(135deg);">
                <circle class="module-knob-bg" cx="32" cy="32" r="28" stroke-dasharray="${arcLength} ${circumference}" stroke-dashoffset="0" />
                <circle class="module-knob-fill" cx="32" cy="32" r="28" stroke-dasharray="${arcLength} ${circumference}" stroke-dashoffset="${valueDashOffset}" />
              </svg>
            </div>
            <div class="module-readout">${readout || value}</div>
          </div>
        `;
      }

      // Knob Style Variations for Comparison

      // STYLE A: Minimal thin arc (like current default)
      function createKnobStyleA(label, value, min, max, readout) {
        const ratio = (value - min) / (max - min);
        const circumference = 2 * Math.PI * 28;
        const arcLength = circumference * (270 / 360);
        const valueDashOffset = arcLength - (arcLength * ratio);
        return `
          <div class="module-card">
            <div class="module-label">${label}</div>
            <div class="module-knob-wrap" data-value="${value}" data-min="${min}" data-max="${max}">
              <svg class="module-knob-svg" viewBox="0 0 64 64" style="transform: rotate(135deg);">
                <circle cx="32" cy="32" r="28" fill="none" stroke="#ccc" stroke-width="4" stroke-dasharray="${arcLength} ${circumference}" />
                <circle cx="32" cy="32" r="28" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="4" stroke-dasharray="${arcLength} ${circumference}" />
                <circle class="module-knob-fill" cx="32" cy="32" r="28" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-dasharray="${arcLength} ${circumference}" stroke-dashoffset="${valueDashOffset}" />
              </svg>
            </div>
          </div>`;
      }

      // STYLE B: Filled dot indicator on circle track
      function createKnobStyleB(label, value, min, max, readout) {

        const angle = 135 + (ratio * 270); // 135deg start, 270deg range

                <circle class="module-knob-dot-fill" cx="${cx}" cy="${cy}" r="6" fill="currentColor" />
                <circle class="module-knob-dot-stroke" cx="${cx}" cy="${cy}" r="6" fill="none" stroke="currentColor" stroke-width="2" />
              </svg>

          </div>`;
      }

      // STYLE C: Thick filled arc wedge
      function createKnobStyleC(label, value, min, max, readout) {
        const ratio = (value - min) / (max - min);
        const circumference = 2 * Math.PI * 24;
        const arcLength = circumference * (270 / 360);
        const valueDashOffset = arcLength - (arcLength * ratio);
        return `
          <div class="module-card">
            <div class="module-label">${label}</div>
            <div class="module-knob-wrap" data-value="${value}" data-min="${min}" data-max="${max}">
              <svg class="module-knob-svg" viewBox="0 0 64 64" style="transform: rotate(135deg);">
                <circle cx="32" cy="32" r="24" fill="none" stroke="#ccc" stroke-width="16" stroke-dasharray="${arcLength} ${circumference}" />
                <circle class="module-knob-fill" cx="32" cy="32" r="24" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="butt" stroke-dasharray="${arcLength} ${circumference}" stroke-dashoffset="${valueDashOffset}" opacity="0.9" />
                <circle cx="32" cy="32" r="24" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="16" stroke-dasharray="${arcLength} ${circumference}" />
              </svg>
            </div>
          </div>`;
      }

      // STYLE D: Notch/tick mark style (like hardware pots)
      function createKnobStyleD(label, value, min, max, readout) {
        const ratio = (value - min) / (max - min);
        const angle = -135 + (ratio * 270);
        return `
          <div class="module-card">
            <div class="module-label">${label}</div>
            <div class="module-knob-wrap" data-value="${value}" data-min="${min}" data-max="${max}" data-knob-style="D">
              <svg class="module-knob-svg" viewBox="0 0 64 64">
                <circle cx="32" cy="32" r="26" fill="none" stroke="#ccc" stroke-width="1" />
                <circle cx="32" cy="32" r="26" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="1" />
                <circle cx="32" cy="32" r="22" fill="rgba(255,255,255,.05)" stroke="#ccc" stroke-width="2" />
                <circle cx="32" cy="32" r="22" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.15)" stroke-width="2" />
                <line class="module-knob-pointer" x1="32" y1="32" x2="32" y2="12" stroke="currentColor" stroke-width="3" stroke-linecap="round" transform="rotate(${angle} 32 32)" />
              </svg>
            </div>
          </div>`;
      }

      // STYLE E: Double arc concentric
      function createKnobStyleE(label, value, min, max, readout) {
        const ratio = (value - min) / (max - min);
        const circumference1 = 2 * Math.PI * 26;
        const circumference2 = 2 * Math.PI * 20;
        const arcLength1 = circumference1 * (270 / 360);
        const arcLength2 = circumference2 * (270 / 360);
        const valueDashOffset1 = arcLength1 - (arcLength1 * ratio);
        const valueDashOffset2 = arcLength2 - (arcLength2 * ratio);
        return `
          <div class="module-card">
            <div class="module-label">${label}</div>
            <div class="module-knob-wrap" data-value="${value}" data-min="${min}" data-max="${max}" data-knob-style="E">
              <svg class="module-knob-svg" viewBox="0 0 64 64" style="transform: rotate(135deg);">
                <circle cx="32" cy="32" r="26" fill="none" stroke="#ccc" stroke-width="3" stroke-dasharray="${arcLength1} ${circumference1}" />
                <circle cx="32" cy="32" r="26" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="3" stroke-dasharray="${arcLength1} ${circumference1}" />
                <circle class="module-knob-fill" cx="32" cy="32" r="26" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-dasharray="${arcLength1} ${circumference1}" stroke-dashoffset="${valueDashOffset1}" />
                <circle class="module-knob-fill-inner" cx="32" cy="32" r="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-dasharray="${arcLength2} ${circumference2}" stroke-dashoffset="${valueDashOffset2}" opacity="0.5" />
              </svg>
            </div>
          </div>`;
      }

      // STYLE F: Pie/wedge fill from center
      function createKnobStyleF(label, value, min, max, readout) {
        const ratio = (value - min) / (max - min);
        const startAngle = 135;
        const endAngle = startAngle + (ratio * 270);
        const startRad = (startAngle * Math.PI) / 180;
        const endRad = (endAngle * Math.PI) / 180;
        const x1 = 32 + 24 * Math.cos(startRad);
        const y1 = 32 + 24 * Math.sin(startRad);
        const x2 = 32 + 24 * Math.cos(endRad);
        const y2 = 32 + 24 * Math.sin(endRad);
        const largeArc = ratio > 0.75 ? 1 : 0;
        return `
          <div class="module-card">
            <div class="module-label">${label}</div>
            <div class="module-knob-wrap" data-value="${value}" data-min="${min}" data-max="${max}" data-knob-style="F">
              <svg class="module-knob-svg" viewBox="0 0 64 64">
                <circle cx="32" cy="32" r="24" fill="none" stroke="#ccc" stroke-width="1" />
                <circle cx="32" cy="32" r="24" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="1" />
                <path class="module-knob-wedge" d="M 32,32 L ${x1},${y1} A 24,24 0 ${largeArc},1 ${x2},${y2} Z" fill="currentColor" opacity="0.3" />
                <circle cx="32" cy="32" r="8" fill="currentColor" opacity="0.6" />
              </svg>
            </div>
          </div>`;
      }

      // STYLE G: Segmented arc (like LED ring)
      function createKnobStyleG(label, value, min, max, readout) {
        const ratio = (value - min) / (max - min);
        const segments = 24;
        const activeSegments = Math.floor(ratio * segments);
        let segmentHTML = '';
        let graySegmentHTML = '';
        for (let i = 0; i < segments; i++) {
          const angle = 135 + (i / segments) * 270;
          const isActive = i < activeSegments;
          graySegmentHTML += `<line x1="32" y1="8" x2="32" y2="14" stroke="#ccc" stroke-width="2" stroke-linecap="round" transform="rotate(${angle} 32 32)" />`;
          segmentHTML += `<line x1="32" y1="8" x2="32" y2="14" stroke="${isActive ? 'currentColor' : 'rgba(255,255,255,.1)'}" stroke-width="2" stroke-linecap="round" transform="rotate(${angle} 32 32)" data-segment="${i}" />`;
        }
        return `
          <div class="module-card">
            <div class="module-label">${label}</div>
            <div class="module-knob-wrap" data-value="${value}" data-min="${min}" data-max="${max}" data-knob-style="G" data-segments="${segments}">
              <svg class="module-knob-svg" viewBox="0 0 64 64">
                ${graySegmentHTML}
                ${segmentHTML}
              </svg>
            </div>
          </div>`;
      }

      // STYLE H: Gradient fill arc
      function createKnobStyleH(label, value, min, max, readout) {
        const ratio = (value - min) / (max - min);
        const circumference = 2 * Math.PI * 26;
        const arcLength = circumference * (270 / 360);
        const valueDashOffset = arcLength - (arcLength * ratio);
        return `
          <div class="module-card">
            <div class="module-label">${label}</div>
            <div class="module-knob-wrap" data-value="${value}" data-min="${min}" data-max="${max}">
              <svg class="module-knob-svg" viewBox="0 0 64 64" style="transform: rotate(135deg);">
                <defs>
                  <linearGradient id="knobGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:currentColor;stop-opacity:0.5" />
                    <stop offset="100%" style="stop-color:currentColor;stop-opacity:1" />
                  </linearGradient>
                </defs>
                <circle cx="32" cy="32" r="26" fill="none" stroke="#ccc" stroke-width="8" stroke-dasharray="${arcLength} ${circumference}" />
                <circle cx="32" cy="32" r="26" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="8" stroke-dasharray="${arcLength} ${circumference}" />
                <circle class="module-knob-fill" cx="32" cy="32" r="26" fill="none" stroke="url(#knobGrad)" stroke-width="8" stroke-linecap="round" stroke-dasharray="${arcLength} ${circumference}" stroke-dashoffset="${valueDashOffset}" />
              </svg>
            </div>
          </div>`;
      }

      function createHorizontalSlider(label, value = 50, min = 0, max = 100, readout = '', leftLabel = '', rightLabel = '') {
        const ratio = (value - min) / (max - min);
        return `
          <div class="module-card">
            <div class="module-label">${label}</div>
            ${leftLabel && rightLabel ? `<div style="display:flex;justify-content:space-between;width:100%;font:700 9px/1 'Space Mono',monospace;color:currentColor;opacity:0.5;margin-bottom:4px;"><span>${leftLabel}</span><span>${rightLabel}</span></div>` : ''}
            <div class="module-slider-wrap" data-value="${value}" data-min="${min}" data-max="${max}">
              <div class="module-slider-fill" style="width: ${ratio * 100}%"></div>
              <div class="module-slider-thumb" style="left: ${ratio * 100}%"></div>
            </div>
            <div class="module-readout">${readout || value}</div>
          </div>
        `;
      }

      function createTrkContSlider(label, value = 50, min = 0, max = 100, readout = '', isFirst = false, isLast = false) {
        const ratio = (value - min) / (max - min);
        const topPadding = isFirst ? '12px' : '3px';
        const bottomPadding = isLast ? '12px' : '3px';
        return `
          <div class="module-card" style="min-height: 0 !important; gap: 2px !important; padding: ${topPadding} 0 ${bottomPadding} 0; padding-left: 12px;">
            <div class="module-label" style="font-size: 10px; text-align: left;">${label}</div>
            <div style="display: flex; align-items: center; gap: 12px; width: 100%;">
              <div class="module-slider-wrap" data-value="${value}" data-min="${min}" data-max="${max}" style="flex: 1;">
                <div class="module-slider-fill" style="width: ${ratio * 100}%"></div>
                <div class="module-slider-thumb" style="left: ${ratio * 100}%"></div>
              </div>
              <div class="module-readout" style="min-width: 50px; text-align: right;">${readout}</div>
            </div>
          </div>
        `;
      }

      function createToggleButtons(label, options, activeIndex = 0) {
        const buttons = options.map((opt, i) =>
          `<button class="module-toggle ${i === activeIndex ? 'is-active' : ''}" data-toggle-value="${opt}">${opt}</button>`
        ).join('');
        return `
          <div class="module-card">
            <div class="module-label">${label}</div>
            <div class="module-toggle-group">${buttons}</div>
          </div>
        `;
      }

      function createADSREnvelope() {
        return `
          <div class="adsr-envelope-wrap">
            <svg class="adsr-envelope-svg" viewBox="0 5 100 50" preserveAspectRatio="none">
              <line class="adsr-axis" x1="0" y1="50" x2="100" y2="50"></line>
              <line class="adsr-axis" x1="2" y1="8" x2="2" y2="52"></line>
              <path class="adsr-envelope-fill" d="M2,50 L15,10 L35,30 L65,30 L98,50 L98,52 L2,52 Z" id="adsr-fill-path"></path>
              <path class="adsr-envelope-line" d="M2,50 L15,10 L35,30 L65,30 L98,50" id="adsr-line-path"></path>
            </svg>
          </div>
        `;
      }

      function createSubTabs(tabs, contents) {
        const tabButtons = tabs.map((tab, i) =>
          `<button class="module-sub-tab ${i === 0 ? 'is-active' : ''}" data-sub-tab="${i}">${tab}</button>`
        ).join('');
        const tabContents = contents.map((content, i) =>
          `<div class="module-sub-content ${i === 0 ? 'is-active' : ''}" data-sub-content="${i}">${content}</div>`
        ).join('');
        return `
          <div class="module-sub-tabs">${tabButtons}</div>
          ${tabContents}
        `;
      }

      function initializeModuleControls() {
        const doc = getInnerDoc();
        if (!doc) return;

        // Initialize circular arc knobs
        doc.querySelectorAll(".module-knob-wrap").forEach((knobWrap) => {
          const min = parseFloat(knobWrap.dataset.min || 0);
          const max = parseFloat(knobWrap.dataset.max || 100);
          const defaultVal = (min + max) / 2; // 12 o'clock position
          let currentVal = parseFloat(knobWrap.dataset.value || defaultVal);

          const card = knobWrap.closest('.module-card');
          const readout = card?.querySelector('.module-readout');
          const fillCircle = knobWrap.querySelector('.module-knob-fill');
          const circumference = 2 * Math.PI * 28;
          const arcLength = circumference * (270 / 360); // 75% of full circle

          const updateVisual = (value) => {
            const ratio = (value - min) / (max - min);
            const knobStyle = knobWrap.dataset.knobStyle;

            // Update visual based on knob style
            if (knobStyle === 'B') {
              // Dot indicator - update cx/cy positions
              const angle = 135 + (ratio * 270);
              const rad = (angle * Math.PI) / 180;
              const cx = 32 + 24 * Math.cos(rad);
              const cy = 32 + 24 * Math.sin(rad);
              const dotFill = knobWrap.querySelector('.module-knob-dot-fill');
              const dotStroke = knobWrap.querySelector('.module-knob-dot-stroke');
              if (dotFill) {
                dotFill.setAttribute('cx', cx);
                dotFill.setAttribute('cy', cy);
              }
              if (dotStroke) {
                dotStroke.setAttribute('cx', cx);
                dotStroke.setAttribute('cy', cy);
              }
            } else if (knobStyle === 'D') {
              // Pointer/notch - update rotation
              const angle = -135 + (ratio * 270);
              const pointer = knobWrap.querySelector('.module-knob-pointer');
              if (pointer) {
                pointer.setAttribute('transform', `rotate(${angle} 32 32)`);
              }
            } else if (knobStyle === 'E') {
              // Double concentric arcs
              const fillOuter = knobWrap.querySelector('.module-knob-fill');
              const fillInner = knobWrap.querySelector('.module-knob-fill-inner');
              if (fillOuter) {
                const circumference1 = 2 * Math.PI * 26;
                const arcLength1 = circumference1 * (270 / 360);
                const valueDashOffset1 = arcLength1 - (arcLength1 * ratio);
                fillOuter.style.strokeDashoffset = valueDashOffset1;
              }
              if (fillInner) {
                const circumference2 = 2 * Math.PI * 20;
                const arcLength2 = circumference2 * (270 / 360);
                const valueDashOffset2 = arcLength2 - (arcLength2 * ratio);
                fillInner.style.strokeDashoffset = valueDashOffset2;
              }
            } else if (knobStyle === 'F') {
              // Pie wedge - update path
              const startAngle = 135;
              const endAngle = startAngle + (ratio * 270);
              const startRad = (startAngle * Math.PI) / 180;
              const endRad = (endAngle * Math.PI) / 180;
              const x1 = 32 + 24 * Math.cos(startRad);
              const y1 = 32 + 24 * Math.sin(startRad);
              const x2 = 32 + 24 * Math.cos(endRad);
              const y2 = 32 + 24 * Math.sin(endRad);
              const largeArc = ratio > 0.75 ? 1 : 0;
              const wedge = knobWrap.querySelector('.module-knob-wedge');
              if (wedge) {
                wedge.setAttribute('d', `M 32,32 L ${x1},${y1} A 24,24 0 ${largeArc},1 ${x2},${y2} Z`);
              }
            } else if (knobStyle === 'G') {
              // Segmented LEDs
              const segments = parseInt(knobWrap.dataset.segments || 24);
              const activeSegments = Math.floor(ratio * segments);
              const lines = knobWrap.querySelectorAll('line[data-segment]');
              lines.forEach((line, i) => {
                const isActive = i < activeSegments;
                line.setAttribute('stroke', isActive ? 'currentColor' : 'rgba(255,255,255,.1)');
              });
            } else if (fillCircle) {
              // Default arc styles (A, C, H) - update stroke-dashoffset
              const valueArcLength = arcLength * ratio;
              const valueDashOffset = arcLength - valueArcLength;
              fillCircle.style.strokeDashoffset = valueDashOffset;
            }

            if (readout) {
              const displayValue = Math.abs(value) < 1 ? value.toFixed(2) : Math.round(value);
              readout.textContent = displayValue;
            }
          };

          // Double-click to reset to default (12 o'clock)
          let lastClickTime = 0;
          knobWrap.addEventListener("mousedown", (e) => {
            e.preventDefault();
            const now = Date.now();
            if (now - lastClickTime < 300) {
              // Double-click detected
              currentVal = defaultVal;
              knobWrap.dataset.value = currentVal;
              updateVisual(currentVal);
              updateADSREnvelope();
              return;
            }
            lastClickTime = now;

            const startY = e.clientY;
            const startVal = currentVal;

            const move = (ev) => {
              // Vertical drag with Ableton-style sensitivity
              // 200px drag = full range (smooth but not too slow)
              const deltaPixels = startY - ev.clientY;
              const deltaRatio = deltaPixels / 200;
              let value = startVal + deltaRatio * (max - min);
              value = Math.min(max, Math.max(min, value));
              currentVal = value;
              knobWrap.dataset.value = value;
              updateVisual(value);
              updateADSREnvelope();
            };

            const up = () => {
              doc.removeEventListener("mousemove", move);
              doc.removeEventListener("mouseup", up);
            };

            doc.addEventListener("mousemove", move);
            doc.addEventListener("mouseup", up);
          });

          updateVisual(currentVal);
        });

        // Function to update ADSR envelope visualization
        function updateADSREnvelope() {
          const fillPath = doc.getElementById('adsr-fill-path');
          const linePath = doc.getElementById('adsr-line-path');
          if (!fillPath || !linePath) return;

          // Get ADSR knob values
          const knobs = doc.querySelectorAll('.module-knob-wrap');
          let attack = 10, decay = 20, sustain = 70, release = 50;

          knobs.forEach(knob => {
            const label = knob.closest('.module-card')?.querySelector('.module-label')?.textContent;
            const value = parseFloat(knob.dataset.value);
            if (label === 'Attack') attack = value;
            else if (label === 'Decay') decay = value;
            else if (label === 'Sustain') sustain = value;
            else if (label === 'Release') release = value;
          });

          // Normalize values to 0-1
          const a = attack / 100;
          const d = decay / 100;
          const s = sustain / 100;
          const r = release / 100;

          // Calculate X positions (0-100 range)
          const attackX = 2 + (a * 20);  // Attack phase
          const decayX = attackX + (d * 30);  // Decay phase
          const sustainX = decayX + 30;  // Sustain phase (fixed width)
          const releaseX = Math.min(sustainX + (r * 30), 98);  // Release phase

          // Calculate Y positions (5-50 range for viewBox)
          const peakY = 10;  // Peak at attack
          const sustainY = 50 - (s * 40);  // Sustain level
          const baseY = 50;  // Base line

          // Update paths
          const lineD = `M2,${baseY} L${attackX},${peakY} L${decayX},${sustainY} L${sustainX},${sustainY} L${releaseX},${baseY}`;
          const fillD = `M2,${baseY} L${attackX},${peakY} L${decayX},${sustainY} L${sustainX},${sustainY} L${releaseX},${baseY} L${releaseX},52 L2,52 Z`;

          linePath.setAttribute('d', lineD);
          fillPath.setAttribute('d', fillD);
        }

        // Initialize horizontal sliders
        doc.querySelectorAll(".module-slider-wrap").forEach((sliderWrap) => {
          const min = parseFloat(sliderWrap.dataset.min || 0);
          const max = parseFloat(sliderWrap.dataset.max || 100);
          const defaultVal = (min + max) / 2;
          let currentVal = parseFloat(sliderWrap.dataset.value || defaultVal);

          const card = sliderWrap.closest('.module-card');
          const readout = card?.querySelector('.module-readout');
          const fill = sliderWrap.querySelector('.module-slider-fill');
          const thumb = sliderWrap.querySelector('.module-slider-thumb');

          const updateVisual = (value, skipStoreUpdate = false) => {
            const ratio = (value - min) / (max - min);
            fill.style.width = `${ratio * 100}%`;
            thumb.style.left = `${ratio * 100}%`;
            if (readout) {
              const label = card?.querySelector('.module-label')?.textContent || '';
              let displayValue;
              let paramName = label.toLowerCase();

              if (label === 'DIRECTION') {
                const dirs = ['FWD', 'REV', 'PEND', 'RAND'];
                displayValue = dirs[Math.round(value)] || 'FWD';
              } else if (label === 'TIME') {
                const ratios = ['1:8', '1:6', '1:4', '1:3', '1:2', '2:3', '1:1', '3:2', '2:1', '3:1', '4:1', '6:1', '8:1'];
                displayValue = ratios[Math.round(value)] || '1:1';
              } else if (label === 'SWING') {
                displayValue = Math.round(value) + '%';
              } else {
                displayValue = Math.abs(value) < 1 ? value.toFixed(2) : Math.round(value);
              }

              readout.textContent = displayValue;

              // Update track control storage
              if (!skipStoreUpdate && typeof setTrackControl === 'function') {
                const win = getInnerWin();
                const instrument = win?.sequencer?.currentInstrument || win?.synthEngine?.currentInstrument || 'synth';
                setTrackControl(instrument, paramName, Math.round(value));
              }
            }
          };

          // Double-click to reset
          let lastClickTime = 0;
          sliderWrap.addEventListener("mousedown", (e) => {
            e.preventDefault();
            const now = Date.now();
            if (now - lastClickTime < 300) {
              currentVal = defaultVal;
              sliderWrap.dataset.value = currentVal;
              updateVisual(currentVal);
              return;
            }
            lastClickTime = now;

            const move = (ev) => {
              const rect = sliderWrap.getBoundingClientRect();
              const x = Math.max(0, Math.min(rect.width, ev.clientX - rect.left));
              const ratio = x / rect.width;
              let value = min + ratio * (max - min);
              value = Math.min(max, Math.max(min, value));

              // Round to integer for discrete sliders
              value = Math.round(value);

              currentVal = value;
              sliderWrap.dataset.value = value;
              updateVisual(value);
            };

            const up = () => {
              doc.removeEventListener("mousemove", move);
              doc.removeEventListener("mouseup", up);
            };

            // Immediately jump to clicked position
            move(e);

            doc.addEventListener("mousemove", move);
            doc.addEventListener("mouseup", up);
          });

          updateVisual(currentVal);
        });

        // Initialize toggle buttons
        doc.querySelectorAll(".module-toggle").forEach((toggle) => {
          toggle.addEventListener("click", () => {
            const group = toggle.closest('.module-toggle-group');
            if (group) {
              group.querySelectorAll('.module-toggle').forEach(t => t.classList.remove('is-active'));
              toggle.classList.add('is-active');
            }
          });
        });

        // Initialize sub-tab switching
        doc.querySelectorAll(".module-sub-tab").forEach((subTab) => {
          subTab.addEventListener("click", () => {
            const tabIndex = subTab.dataset.subTab;
            const parent = subTab.closest('.module-view') || moduleView;

            // Toggle tab buttons
            parent.querySelectorAll('.module-sub-tab').forEach(tab => {
              tab.classList.toggle('is-active', tab.dataset.subTab === tabIndex);
            });

            // Toggle content sections
            parent.querySelectorAll('.module-sub-content').forEach(content => {
              content.classList.toggle('is-active', content.dataset.subContent === tabIndex);
            });

            // Re-initialize controls in newly shown content
            initializeModuleControls();
          });
        });

        // Initialize drum pad clicks (if in DRUM module)
        doc.querySelectorAll(".drum-pad").forEach((pad) => {
          pad.addEventListener("click", () => {
            const padIndex = parseInt(pad.dataset.pad || '0');

            // Visual feedback
            pad.classList.add('is-playing');
            setTimeout(() => pad.classList.remove('is-playing'), 150);

            // Update all pads' active state
            doc.querySelectorAll('.drum-pad').forEach(p => p.classList.remove('is-selected'));
            pad.classList.add('is-selected');

            // TODO: Trigger drum sound via synthEngine when backend is hooked up
            // if (win?.synthEngine?.playDrumPad) {
            //   win.synthEngine.playDrumPad(padIndex);
            // }
          });
        });

        // Re-initialize ADSR knobs if present
        doc.querySelectorAll(".knob").forEach((knob) => {
          const param = knob.dataset.param;
          const input = doc.getElementById(param);
          if (!input) return;

          let startY = 0;
          let startVal = 0;
          const min = parseFloat(input.min || 0);
          const max = parseFloat(input.max || 1);

          const updateKnobVisual = (value) => {
            const ratio = max === min ? 0 : (value - min) / (max - min);
            knob.style.setProperty("--knob-angle", `${ratio * 270}deg`);
          };

          updateKnobVisual(parseFloat(input.value || 0));

          const newKnob = knob.cloneNode(true);
          knob.parentNode.replaceChild(newKnob, knob);

          newKnob.addEventListener("mousedown", (e) => {
            e.preventDefault();
            startY = e.clientY;
            startVal = parseFloat(input.value || 0);

            const move = (ev) => {
              const range = max - min;
              const deltaRatio = (startY - ev.clientY) / 160;
              let value = startVal + deltaRatio * range;
              value = Math.min(max, Math.max(min, value));
              input.value = value;
              input.dispatchEvent(new Event("input", { bubbles: true }));
              updateKnobVisual(value);
            };

            const up = () => {
              doc.removeEventListener("mousemove", move);
              doc.removeEventListener("mouseup", up);
            };

            doc.addEventListener("mousemove", move);
            doc.addEventListener("mouseup", up);
          });
        });
      }

      // Check if a pattern has any active steps in the sequencer
      function patternHasData(patternIndex) {
        const win = getInnerWin();
        if (!win || !win.sequencer) return false;

        // Convert from 1-based to 0-based index
        const index = patternIndex - 1;

        // If this is the CURRENT pattern, check the live sequencerTracks
        if (win.sequencer.currentPatternIndex === index) {
          const tracks = ['synth', 'bass', 'keys', 'lead'];
          for (const track of tracks) {
            if (win.sequencer.sequencerTracks[track]) {
              // Check if any step is active (non-zero value)
              if (win.sequencer.sequencerTracks[track].some(step => step !== 0)) {
                return true;
              }
            }
          }
          return false;
        }

        // For other patterns, check saved pattern memory
        if (!win.sequencer.memory) return false;
        const memory = win.sequencer.memory.patternMemory;
        if (!memory || !memory[index]) return false;

        // Check if any track has active notes
        const pattern = memory[index];
        const tracks = ['synth', 'bass', 'keys', 'lead'];

        for (const track of tracks) {
          if (pattern[track] && pattern[track].length > 0) {
            // Check if any step is active (non-zero value)
            if (pattern[track].some(step => step !== 0)) {
              return true;
            }
          }
        }

        return false;
      }

        function syncGlobalMode() {
          globalPatternMode = patternMode;

        // ⚠️ IMPORTANT: Pattern grid buttons are DYNAMICALLY CREATED from this array
        // This is the 5x2 grid shown in the EDIT panel (left side)

        const controlTabs = [
          ['dup','DUP'],
