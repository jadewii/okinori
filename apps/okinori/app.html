/* CSS Variables for theming */
body {
  --app-bg: #000;
  --app-surface: #111;
  --app-line: rgba(255,255,255,0.15);
  --app-text: #fff;
  --app-text-dim: rgba(255,255,255,0.6);
}

body.jamnutz-light {
  --app-bg: #f6f6f6;
  --app-surface: #ffffff;
  --app-line: rgba(0,0,0,0.15);
  --app-text: #111;
  --app-text-dim: rgba(0,0,0,0.6);
}

/* reset.css */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Press Start 2P', 'VT323', monospace;
    touch-action: manipulation;
}

body {
    background-color: #00ff00;
    color: #ffffff;
    width: 100vw;
    height: 100vh;
    padding: 0;
    cursor: default;
    overflow: hidden;
    background-image: none;
    margin: 0;
}

h3 {
    font-size: 13px;
    margin: 0 0 8px 0;
    border-bottom: 1px solid #ffffff;
    padding-bottom: 4px;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 1px;
}

/* layout.css */
.synth-container {
    width: 1520px;
    height: 900px;
    background-color: #000000;
    border-radius: 0;
    border: 0;
    padding: 10px 10px 8px;
    box-shadow: none;
    display: grid;
    grid-template-rows: 1fr auto;
    gap: 10px;
    margin: 0;
    overflow: hidden;
}

.control-panel {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 10px;
    overflow: hidden;
    height: 100%;
}

.oscillator-section {
    background-color: #111111;
    padding: 12px;
    border-radius: 0px;
    border: 2px solid #ffffff;
    box-shadow: none;
    display: flex;
    flex-direction: column;
    gap: 15px;
    overflow: hidden;
    max-height: 100%;
}

.sequencer-section {
    background-color: #111111;
    padding: 12px;
    border-radius: 0px;
    border: 2px solid #ffffff;
    box-shadow: none;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    max-height: 100%;
    min-height: 0;
}

.window-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 10px;
    background-color: #ffffff;
    color: #000000;
    font-weight: bold;
    border: none;
}

.window-title span {
    flex: 1;
    text-align: center;
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    letter-spacing: 1px;
}

/* controls.css */
.control-group {
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
}

label {
    display: inline-block;
    margin-right: 8px;
    font-weight: normal;
    color: #ffffff;
    min-width: 25px;
}

.win95-button {
    background-color: #222222; 
    border: 2px solid #ffffff;
    border-radius: 0;
    padding: 8px;
    font-size: 13px;
    color: #ffffff;
    cursor: pointer;
    min-width: 40px;
    min-height: 40px;
    font-family: 'Press Start 2P', monospace;
    transition: all 0.2s ease;
    box-shadow: none;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Light gray buttons for secondary actions */
.win95-button.secondary {
    background-color: #cccccc;
    color: #333333;
    border-color: #999999;
}

.win95-button.secondary:hover {
    background-color: #dddddd;
}

.win95-button:hover {
    background-color: #333333;
    transform: scale(1.05);
}

.win95-button.active {
    background-color: #ffffff;
    color: #000000;
}

.instrument-button, .arp-button {
    border-radius: 0;
    min-height: 50px;
    min-width: 50px;
}

.octave-button {
    border-radius: 0;
    width: 30px;
    height: 30px;
    min-width: 30px;
    min-height: 30px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}

.pattern-memory {
    margin: 8px 0;
    width: 100%;
    background-color: #111111;
    border-radius: 0px;
    border: 2px solid #ffffff;
    padding: 8px;
    box-shadow: none;
}

input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    background: #222222;
    border: 1px solid #ffffff;
    height: 8px;
    border-radius: 4px;
}

input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    background: #ffffff;
    border: none;
    border-radius: 50%;
}

.value-display {
    color: #ffffff;
    font-family: 'Press Start 2P', monospace;
}

.sequencer-controls {
    display: flex;
    flex-direction: row;
    gap: 10px;
    margin-bottom: 15px;
    flex-wrap: wrap;
}

.scale-button {
    border-radius: 0;
    width: 140px;
    height: 35px;
    min-width: 140px;
    min-height: 35px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
}

.seq-button-container {
    margin-right: 0;
}

.direction-controls {
    display: flex;
    justify-content: center;
    gap: 5px;
    margin-top: 8px;
}

.direction-button {
    width: 35px;
    height: 25px;
    font-size: 14px;
    min-width: 35px;
    min-height: 25px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #222222;
    border: 1px solid #ffffff;
    color: #ffffff;
}

.direction-button.active {
    background-color: #ffffff;
    color: #000000;
}

.direction-button.track-synth {
    border-color: #ffffff;
    color: #ffffff;
}

.direction-button.track-synth.active {
    background-color: #ff3366;
    color: #000000;
}

.direction-button.track-bass {
    border-color: #ffffff;
    color: #ffffff;
}

.direction-button.track-bass.active {
    background-color: #33ff66;
    color: #000000;
}

.direction-button.track-keys {
    border-color: #ffffff;
    color: #ffffff;
}

.direction-button.track-keys.active {
    background-color: #ffffff;
    color: #000000;
}

.direction-button.track-lead {
    border-color: #ffffff;
    color: #ffffff;
}

.direction-button.track-lead.active {
    background-color: #8a46ff;
    color: #000000;
}

.direction-button.track-pad {
    border-color: #ffffff;
    color: #ffffff;
}

.direction-button.track-pad.active {
    background-color: #ff33ff;
    color: #000000;
}

.direction-button.track-fx {
    border-color: #ffffff;
    color: #ffffff;
}

.direction-button.track-fx.active {
    background-color: #33ffff;
    color: #000000;
}

/* keyboard.css */
.keyboard-container {
    display: flex;
    justify-content: space-between;
    height: 100px;
    position: relative;
    margin-top: 10px;
    border-radius: 8px;
    border: 2px solid #ffffff;
    padding: 0;
    background-color: #cccccc; 
    overflow: hidden;
    box-shadow: none;
    min-height: 100px;
    max-height: 120px;
}

.key {
    position: relative;
    flex: 1;
    height: 100%;
    background-color: #cccccc;
    border: 1px solid var(--current-track-color, #ffffff);
    border-radius: 0 0 4px 4px;
    cursor: pointer;
    z-index: 1;
    box-shadow: none;
    margin: 0 -1px;
    min-width: 12px;
    transition: background-color 0.1s ease, border-color 0.1s ease;
}

.key.white {
    background-color: #cccccc;
}

.key.black {
    background-color: var(--current-track-color, #999999);
    width: 16px;
    flex: 0 0 16px;
    height: 60%;
    margin: 0 -8px;
    z-index: 2;
    box-shadow: none;
    border-color: var(--current-track-color, #ffffff);
    border-radius: 0 0 4px 4px;
}

.key.active {
    background-color: #ffffff;
}

.key.black.active {
    background-color: #ffffff;
}

.key.active.synth {
    background-color: #ff385c !important;
}

.key.active.bass {
    background-color: #1bdb74 !important;
}

.key.active.keys {
    background-color: #ff9d00 !important;
}

.key.active.lead {
    background-color: #8a46ff !important;
}

.key.active.pad {
    background-color: #ff33ff;
}

.key.active.fx {
    background-color: #33ffff;
}

body.jamnutz-light .grid-cell.instrument-cell {
    background-color: #ffffff;
    border-color: #777777;
}

body.jamnutz-light .grid-cell.instrument-cell.sharp-note,
body.jamnutz-light .grid-cell.instrument-cell.natural-note {

}

body.jamnutz-light .grid-cell.active:not(.current-instrument) {

}

body.jamnutz-light .grid-cell.active-synth:not(.current-instrument) {
    background-color: rgba(255, 51, 102, 0.22) !important;
    color: #ff3366 !important;
    border-color: #ff3366 !important;

body.jamnutz-light .grid-cell.active-bass:not(.current-instrument) {

}

/* sequencer.css */
.sequence-grid {
    display: grid;
    grid-template-columns: repeat(32, 1fr);
    grid-template-rows: repeat(12, 1fr);
    gap: 2px;
    border-radius: 8px;
    background-color: #222222; 
    border: 2px solid #ff6600;
    padding: 8px;
    height: 400px;
    margin-bottom: 15px;
    box-shadow: none;
    flex: 1;
    min-height: 0;
    overflow: auto;
    width: 100%;
    box-sizing: border-box;
}

.sequence-grid.instrument-grid {
    background-color: #222222;
    border: 2px solid #ffffff;
    padding: 8px;
    border-radius: 8px;
}

.grid-cell {
    background-color: #000000;
    border: 1px solid #555555;
    border-radius: 2px;
    aspect-ratio: 1;
    position: relative;
    width: 100%;
    height: 100%;
    min-width: 12px;
    min-height: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    color: #aaaaaa;
    box-sizing: border-box;
    margin: 0;
    transform: none;
    overflow: hidden;
    cursor: pointer;
}

.grid-cell.instrument-cell {
    background-color: #000000;
    border: 1px solid #333333;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.1s ease;
}

.grid-cell.instrument-cell:hover {
    background-color: #000000;
    border-color: #ffffff;
}

.grid-cell.instrument-cell.sharp-note {
    background-color: #000000;
    color: #ffcc00;
}

.grid-cell.instrument-cell.sharp-note[data-row="0"] {
    background-color: #000000 !important;
    color: #ff6600 !important;
}

.grid-cell.instrument-cell.natural-note {
    background-color: #000000;
    color: #ffffff;
}

.grid-cell.instrument-cell.active {
    background-color: #000000;
    color: #ffffff;
    transform: scale(1.1);
    border-color: #ffffff;
    border-width: 2px;
}

    font-weight: 700 !important;

.adsr-preview-panel {
    position: relative;
    min-height: 68px;
    border-radius: 18px;
    padding: 8px 10px 8px;
    background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.025));
    border: 1px solid rgba(255,255,255,0.08);
    overflow: hidden;
}

.adsr-preview-panel::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px) 0 0 / 100% 16px,
      linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px) 0 0 / 20% 100%;

.adsr-preview-svg {

    height: 50px;

}

.adsr-preview-svg .adsr-axis {
    stroke: rgba(255,255,255,0.16);
    stroke-width: 1;
}

.adsr-preview-svg .adsr-preview-line {
    fill: none;
    stroke: var(--adsr-accent);
    stroke-width: 3.25;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 0 10px color-mix(in srgb, var(--adsr-accent) 38%, transparent));
}

.adsr-preview-svg .adsr-preview-fill {
    fill: color-mix(in srgb, var(--adsr-accent) 12%, transparent);
    stroke: none;
}

.adsr-main-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    min-height: 0;
}

.adsr-knob-card,
.adsr-slider-card {
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.08);

    padding: 8px;
    display: flex;

    align-items: center;
    justify-content: space-between;
    gap: 8px;
    min-height: 0;
}

.adsr-control-head {
    width: 100%;

    align-items: center;
    justify-content: space-between;
    gap: 6px;
}

.adsr-controls label {
    margin: 0;
    min-width: 0;

    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.82;
}

.adsr-controls .value-display {
    min-width: 40px;
    text-align: right;
    color: inherit;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.04em;
}

.adsr-knob-shell {
    position: relative;
    width: 68px;
    height: 68px;
    display: grid;
    place-items: center;
}

.adsr-knob-ring {
    --knob-angle: 0deg;
    --knob-value: 0;
    position: relative;
    width: 68px;
    height: 68px;
    display: grid;
    place-items: center;
}

.adsr-knob-ring svg {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    transform: rotate(-90deg);
    z-index: 1;
}

.adsr-knob-ring .knob-track {
    fill: none;
    stroke: rgba(255, 255, 255, 0.08);
    stroke-width: 4;
    stroke-linecap: round;
}

.adsr-knob-ring .knob-value {
    fill: none;
    stroke: var(--adsr-accent);
    stroke-width: 10;
    stroke-linecap: round;
    transition: stroke-dasharray 0.08s ease-out;
}

.adsr-knob-ring::before {
    content: "";
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: #1d1d1d;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 8px 16px rgba(0,0,0,0.28);
    position: relative;
    z-index: 2;
}

.adsr-knob-ring::after {
    content: "";
    position: absolute;
    width: 3px;
    height: 18px;
    border-radius: 999px;
    background: var(--adsr-accent);
    top: 10px;
    left: calc(50% - 1.5px);
    transform-origin: 50% 24px;
    transform: rotate(calc(-135deg + var(--knob-angle)));
    box-shadow: 0 0 10px color-mix(in srgb, var(--adsr-accent) 35%, transparent);
    z-index: 3;
}

.adsr-knob-input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
}

.adsr-slider-track {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 22px;
}

.adsr-slider-input {
    width: 100%;
    height: 10px;
    border: 0 !important;
    border-radius: 999px;
    background: linear-gradient(90deg, color-mix(in srgb, var(--adsr-accent) 72%, transparent) 0%, color-mix(in srgb, var(--adsr-accent) 72%, transparent) var(--slider-fill, 0%), rgba(255,255,255,0.12) var(--slider-fill, 0%), rgba(255,255,255,0.12) 100%);
}

.adsr-slider-input::-webkit-slider-runnable-track {
    height: 10px !important;
    border: 0 !important;
    border-radius: 999px;
    background: transparent !important;
}

.adsr-slider-input::-moz-range-track {
    height: 10px !important;
    border: 0 !important;
    border-radius: 999px;
    background: transparent !important;
}

.adsr-slider-input::-webkit-slider-thumb {
    width: 16px !important;
    height: 16px !important;
    margin-top: -3px !important;
    border: 0 !important;
    border-radius: 50%;
    background: var(--adsr-accent) !important;
    box-shadow: 0 0 0 4px rgba(255,255,255,0.16);
}

.adsr-slider-input::-moz-range-thumb {
    width: 16px !important;
    height: 16px !important;
    border: 0 !important;
    border-radius: 50%;
    background: var(--adsr-accent) !important;
    box-shadow: 0 0 0 4px rgba(255,255,255,0.16);
}

.adsr-control-name {
    font-size: 11px;

}

.adsr-caption {
    font-size: 8px;

/* arpeggiator.css */
.led {

    border: 2px solid #333333;
    border-radius: 50%;
    margin: 0 3px;
    transition: all 0.2s ease;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
}

.led.active {
    background-color: #ff6600;
    border-color: #ff6600;
    box-shadow: 0 0 10px #ff6600, 0 0 20px rgba(255, 102, 0, 0.4), inset 0 1px 3px rgba(255,255,255,0.3);
    transform: scale(1.05);
}

/* full-page shell */
html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
}

body {
    min-height: 100dvh;
    display: block;
    padding: 0;
    margin: 0;
    background: #000000;
}

.app-topbar {
    display: none;
}

.synth-container {
    width: 100%;
    max-width: none;
    height: 100dvh;
    min-height: 100dvh;
    max-height: none;
    margin: 0;
    padding: 12px;
    gap: 12px;
    grid-template-rows: minmax(0, 1fr) 100px;
    background-color: #000000;
}

.control-panel,
.oscillator-section,
.sequencer-section,
.tr-sequencer-container {
    min-height: 0;
    max-height: none;
}

.control-panel {
    grid-template-columns: 220px minmax(0, 1fr);
    align-items: stretch;
}

.oscillator-section,
.sequencer-section {
    height: 100%;
}

.oscillator-section {
    padding: 12px;
    gap: 14px;
}

.sequencer-section {
    display: grid;
    grid-template-rows: auto auto minmax(0, 1fr) auto auto;
    gap: 12px;
    padding: 12px;
}

.sequencer-controls {
    margin-bottom: 0;
    align-items: center;
}

.pattern-memory {
    margin: 0;
}

.sequence-grid,
#sequencer-grid,
.drum-machine-grid {
    min-height: 0;
    height: 100%;
}

#sequencer-grid {
    align-self: stretch;
    background: var(--app-surface);
}

.keyboard-container {
    width: 100%;
    margin-top: 0;
    min-height: 100px;
    height: 100px;
    max-height: 100px;
    border-radius: 0;
}

@media (min-width: 1400px) {
    .control-panel {
        grid-template-columns: 240px minmax(0, 1fr);
    }

    .synth-container {
        padding: 14px;
        gap: 14px;
        grid-template-rows: minmax(0, 1fr) 112px;
    }

    .keyboard-container {
        min-height: 112px;
        height: 112px;
        max-height: 112px;
    }
}

@media (max-width: 1024px) {
    .control-panel {
        grid-template-columns: 200px minmax(0, 1fr);
    }
}

@media (max-width: 768px) {
    .synth-container {
        padding: 8px;
        gap: 8px;
        grid-template-rows: minmax(0, 1fr) 72px;
    }

    .control-panel {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(0, 1fr);
    }

    .oscillator-section {
        gap: 10px;
    }

    .keyboard-container {
        height: 72px;
        min-height: 72px;
        max-height: 72px;
    }
}

  // Load instrument settings from localStorage
  function loadInstrumentSettings() {
    try {
      const saved = localStorage.getItem('okinori_instrumentSettings');
      if (saved) {
        const parsed = JSON.parse(saved);
        // Merge saved settings with factory presets (in case new parameters were added)
        const factoryPresets = getFactoryPresets();
        Object.keys(this.instrumentSettings).forEach(track => {
          if (parsed[track]) {
            // Merge and SANITIZE to fix any corrupt ADSR values
            this.instrumentSettings[track] = sanitizeEnvelope({ ...factoryPresets[track], ...parsed[track] });
          }
        });
        console.log('Loaded and sanitized instrument settings from localStorage');
        return true;
      }
    } catch (e) {
      console.warn('Failed to load settings from localStorage:', e);
    }

  function startArpeggiator(instrument) {

    const arpSpeed = 6e4 / (this.tempo || 120) / 4;
    arp.step = 0;
    arp.interval = setInterval(() => {
      let notesToPlay = arp.notes.length > 0 ? arp.notes : [];
      if (notesToPlay.length === 0 && arp.looping && arp.lastNotes && arp.lastNotes.length > 0) {
        notesToPlay = [...arp.lastNotes];
      }
      if (notesToPlay.length === 0 && !arp.looping) {
        this.stopArpeggiator(instrument);
        return;
      }
      if (notesToPlay.length > 0) {
        const patternIndex = arp.pattern[arp.step % arp.pattern.length];
        const noteIndex = patternIndex % notesToPlay.length;
        const note = notesToPlay[noteIndex];
        if (note) {
          this.playNoteWithInstrument(note, instrument);
          setTimeout(() => {

    const noteName = note.slice(0, -1);
    arp.notes = arp.notes.filter((n) => {
      const currentNoteName = n.slice(0, -1);
      if (currentNoteName === noteName) {

      return true;

    if (arp.notes.length === 0) {

  function createNoiseNode(duration, gain = 0.5) {
    const bufferSize = this.audioContext.sampleRate * duration;
    const buffer = this.audioContext.createBuffer(1, bufferSize, this.audioContext.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = Math.random() * 2 - 1;
    }
    const noise = this.audioContext.createBufferSource();
    noise.buffer = buffer;
    const noiseGain = this.audioContext.createGain();
    noiseGain.gain.setValueAtTime(gain, this.audioContext.currentTime);
    noiseGain.gain.exponentialRampToValueAtTime(1e-3, this.audioContext.currentTime + duration);
    noise.connect(noiseGain);
    noise.start();
    noise.stop(this.audioContext.currentTime + duration);

        lead: this.audioContext.createGain()

        bass: this.audioContext.createStereoPanner(),
        keys: this.audioContext.createStereoPanner(),
        lead: this.audioContext.createStereoPanner()
      };

      Object.keys(this.trackGains).forEach(track => {
        this.trackGains[track].connect(this.trackFilters[track]);
        this.trackFilters[track].connect(this.trackPanners[track]);
        this.trackPanners[track].connect(this.analysers[track]);

    async loadDrumSamples() {

        const hihatClosedBuffer = await this.audioContext.decodeAudioData(await hihatClosedResponse.arrayBuffer());
        const hihatOpenBuffer = await this.audioContext.decodeAudioData(await hihatOpenResponse.arrayBuffer());
        this.samples = {

          "Hi-hat C": hihatClosedBuffer,

        };

    preloadDrumSamples() {

          silentGain.gain.value = 0;
          silentGain.connect(this.audioContext.destination);
          ["Kick", "Snare", "Hi-hat C", "Hi-hat O"].forEach((drumType) => {
            if (this.samples[drumType]) {
              const source = this.audioContext.createBufferSource();
              source.buffer = this.samples[drumType];

      if (param === 'attack' || param === 'decay') {
        sanitizedValue = Math.max(0.001, Math.min(10, Number(value) || 0.01));
      } else if (param === 'sustain') {
        sanitizedValue = Math.max(0, Math.min(1, Number(value) || 0.5));
      } else if (param === 'release') {
        sanitizedValue = Math.max(0.005, Math.min(10, Number(value) || 0.2));

    setupEmergencyCleanup() {
      this.audioContext.addEventListener("statechange", () => {
        if (this.audioContext.state === "interrupted" || this.audioContext.state === "suspended") {
          Object.keys(this.activeOscillators).forEach((note) => {

      this.buttons.fx = document.getElementById("instrument-fx");
      this.setupEventListeners();
      this.updateButtonStates();
    }
    setupEventListeners() {
      Object.keys(this.buttons).forEach((instrument) => {
        const initialWaveform = this.synthEngine.instrumentSettings[instrument].waveform;
        this.updateButtonText(instrument, initialWaveform);
        this.buttons[instrument].addEventListener("click", () => {
          this.synthEngine.setInstrument(instrument);
          Object.keys(this.buttons).forEach((inst) => {
            this.buttons[inst].classList.remove("active");
          });
          this.buttons[instrument].classList.add("active");
          if (window.sequencer) {
            window.sequencer.setCurrentInstrument(instrument);
          }
          const adsrControlsElement = document.querySelector(".adsr-controls");
          if (adsrControlsElement) {
            adsrControlsElement.dataset.instrument = instrument;
          }
          if (adsrControlsElement && adsrControlsElement.__adsrControlsInstance) {
            adsrControlsElement.__adsrControlsInstance.updateValues();
          }
          this.cycleWaveform(instrument);
        });
      });
    }
    cycleWaveform(instrument) {
      const waveforms = ["square", "sine", "sawtooth", "triangle"];
      const currentWaveform = this.synthEngine.instrumentSettings[instrument].waveform;
      const currentIndex = waveforms.indexOf(currentWaveform);
      const nextIndex = (currentIndex + 1) % waveforms.length;
      const nextWaveform = waveforms[nextIndex];
      this.synthEngine.instrumentSettings[instrument].waveform = nextWaveform;
      this.updateButtonText(instrument, nextWaveform);
      this.buttons[instrument].classList.add("waveform-change");
      setTimeout(() => {
        this.buttons[instrument].classList.remove("waveform-change");
      }, 300);
      const note = "C4";
      this.synthEngine.playNoteWithInstrument(note, instrument);
      setTimeout(() => this.synthEngine.stopNote(note), 200);
    }
    updateButtonText(instrument, waveform) {
      let displayName;
      switch (instrument) {
        case "synth":
          displayName = "Synth";
          break;
        case "bass":
          displayName = "Bass";
          break;
        case "keys":
          displayName = "Keys";
          break;
        case "lead":
          displayName = "Lead";
          break;
        case "pad":
          displayName = "Pad";
          break;
        case "fx":
          displayName = "FX";
          break;

      }
      this.buttons[instrument].setAttribute("title", `${displayName} - ${waveform}`);

      Object.keys(this.buttons).forEach((instrument) => {
        this.buttons[instrument].addEventListener("click", () => {
          const arp = this.synthEngine.arpeggiators[instrument];
          if (!arp.enabled) {
            this.synthEngine.toggleArpeggiator(instrument, true, false);
            this.buttons[instrument].classList.add("active");
            this.buttons[instrument].classList.remove("looping");
            this.updateArpLeds(instrument, 1);
          } else if (arp.enabled && !arp.looping) {
            this.synthEngine.toggleArpeggiator(instrument, true, true);
            this.buttons[instrument].classList.add("active");
            this.buttons[instrument].classList.add("looping");
            this.updateArpLeds(instrument, 2);
          } else {
            this.synthEngine.toggleArpeggiator(instrument, false, false);
            this.buttons[instrument].classList.remove("active");
            this.buttons[instrument].classList.remove("looping");
            this.updateArpLeds(instrument, 0);
          }
        });
      });
    }
    updateArpLeds(instrument, state) {
      document.querySelectorAll(`.led[data-instrument="${instrument}"]`).forEach((led) => {
        led.classList.remove("active");
      });
      if (state >= 1) {
        document.querySelector(`.led[data-instrument="${instrument}"][data-led="1"]`).classList.add("active");
      }
      if (state >= 2) {
        document.querySelector(`.led[data-instrument="${instrument}"][data-led="2"]`).classList.add("active");
      }
      if (state >= 3) {
        document.querySelector(`.led[data-instrument="${instrument}"][data-led="3"]`).classList.add("active");
      }

      this.directions[this.currentInstrument] = newDirection;
      this.pendulumReverse[this.currentInstrument] = false;

    }
    updateDirectionButtonStates() {
      const currentDirection = this.directions[this.currentInstrument];
      document.querySelectorAll(".direction-button").forEach((btn) => {
        btn.classList.remove("active");
      });
      document.getElementById(`direction-${currentDirection}`).classList.add("active");
    }
    getNextStep() {
      let nextStep;
      const currentDirection = this.directions[this.currentInstrument];
      const currentPendulumReverse = this.pendulumReverse[this.currentInstrument];
      switch (currentDirection) {
        case "reverse":
          nextStep = this.currentStep - 1;
          if (nextStep < 0) nextStep = 31;
          break;
        case "pendulum":
          if (!currentPendulumReverse) {
            nextStep = this.currentStep + 1;
            if (nextStep >= 31) {
              nextStep = 31;
              this.pendulumReverse[this.currentInstrument] = true;
            }
          } else {
            nextStep = this.currentStep - 1;
            if (nextStep <= 0) {
              nextStep = 0;
              this.pendulumReverse[this.currentInstrument] = false;
            }
          }
          break;
        case "random":
          nextStep = Math.floor(Math.random() * 32);
          break;
        default:
          nextStep = (this.currentStep + 1) % 32;
          break;
      }
      return nextStep;
    }
    getStepDuration() {
      return 60 / this.tempo / this.stepDivision;
    }
    getLoopDuration() {
      return this.getStepDuration() * 32;
    }
    startTransportClock(audioTime, startStep = 0) {
      this.lastStartStep = startStep;
      this.transportStartTime = audioTime - startStep * this.getStepDuration();
    }
    getPlayheadStepFloat(audioTime) {
      if (!this.sequencerRunning) return this.currentStep;
      const stepDuration = this.getStepDuration();
      const loopDuration = stepDuration * 32;
      let elapsed = audioTime - this.transportStartTime;
      elapsed = ((elapsed % loopDuration) + loopDuration) % loopDuration;
      let stepFloat = elapsed / stepDuration;
      const dir = this.directions?.[this.currentInstrument] || "forward";
      if (dir === "reverse") {
        stepFloat = (32 - stepFloat) % 32;
      }
      return stepFloat;
    }
    startSequencer() {
      if (this.synthEngine.audioContext.state !== "running") {
        this.synthEngine.audioContext.resume().then(() => {
          this.player.startSequencer();
        }).catch((error) => {
          console.error("Failed to resume audio context:", error);
          this.player.startSequencer();
        });
      } else {
        this.player.startSequencer();
      }
    }
    stopSequencer() {
      this.player.stopSequencer();
    }
    generateRandomSequence() {
      this.patterns.generateRandomSequence();
      this.memory.savePatternWithUI(this.currentPatternIndex);
    }
    clearSequencer() {
      this.patterns.clearSequencer();
      this.memory.savePatternWithUI(this.currentPatternIndex);
    }
    toggleSequencerStep(index) {
      this.ui.toggleSequencerStep(index);
    }
    setCurrentInstrument(instrument) {
      this.selectedCellIndex = -1;
      this.currentInstrument = instrument;
      this.grid.createGrid();
      this.updateDirectionButtonColors(instrument);
      this.updateDirectionButtonStates();
    }
    updateDirectionButtonColors(instrument) {
      const directionButtons = document.querySelectorAll(".direction-button");
      directionButtons.forEach((button) => {
        button.classList.remove("track-synth", "track-bass", "track-keys", "track-lead", "track-pad", "track-fx");
        button.classList.add(`track-${instrument}`);
      });
    }
    addNoteToSequencer(note) {
      if (this.recording) {
        const noteNameOnly = note.replace(/\d+$/, "");
        const octave = parseInt(note.slice(-1));
        const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        let row = notes.indexOf(noteNameOnly);
        if (row === -1) return;
        row += (4 - octave) * 12;
        row = Math.max(0, Math.min(11, 11 - row));
        const column = this.currentStep % 32;
        const cellIndex = row * 32 + column;
        for (let r = 0; r < 12; r++) {
          const existingIndex = r * 32 + column;
          this.sequencerTracks[this.currentInstrument][existingIndex] = 0;
        }
        const randomOctave = Math.floor(Math.random() * 3) + 1;
        this.sequencerTracks[this.currentInstrument][cellIndex] = randomOctave;
        this.grid.createGrid();
        this.memory.savePatternWithUI(this.currentPatternIndex);
        this.currentStep = this.getNextStep();
      }
    }
    shiftSequenceOctave(direction, forceInstrument = null) {
      const instrument = forceInstrument || this.currentInstrument;
      const shift = direction === "up" ? 1 : -1;

      // Transpose all existing notes in the sequencer track
      const track = this.sequencerTracks[instrument];
      if (track) {
        for (let i = 0; i < track.length; i++) {
          const currentValue = track[i];
          if (currentValue > 0) {
            // Each octave has 7 scale degrees, so shift by 7 steps
            const newValue = currentValue + (shift * 7);
            // Clamp to valid range (1-84 for 12 rows * 7 scale degrees)
            track[i] = Math.max(1, Math.min(84, newValue));
          }
        }
      }

      // Update offset for future notes
      if (direction === "up") {
        this.sequencerOctaveOffsets[instrument] = Math.min(2, (this.sequencerOctaveOffsets[instrument] || 0) + 1);
      } else {
        this.sequencerOctaveOffsets[instrument] = Math.max(-2, (this.sequencerOctaveOffsets[instrument] || 0) - 1);
      }

      const oldOffset = this.sequencerOctaveOffsets[instrument] || 0;
      const newOffset = this.sequencerOctaveOffsets[instrument];
      if (this.synthEngine.arpeggiators[instrument] && this.synthEngine.arpeggiators[instrument].enabled) {
        const baseOctave = 4;
        const oldOctave = baseOctave + oldOffset;
        const newOctave = baseOctave + newOffset;
        if (window.keyboard) {
          window.keyboard.updateArpeggiatorNotesOctave(instrument, oldOctave, newOctave);
        }
      }
      this.memory.savePatternWithUI(this.currentPatternIndex);
      console.log(`${instrument} octave offset: ${this.sequencerOctaveOffsets[instrument]}`);
    }

window.addEventListener("message", async (event) => {
  const action = event?.data?.type;
  if (!action || !window.sequencer) return;
  if (action === "jamnutz:save-project") {
    try {
      const payload = collectOkinoriProject();
      localStorage.setItem("jamnutz-okinori-project", JSON.stringify(payload));
      event.source?.postMessage({ type: "jamnutz:save-complete", projectName: payload.meta.projectName }, event.origin || "*");
    } catch (error) {
      event.source?.postMessage({ type: "jamnutz:error", message: "Could not save project." }, event.origin || "*");
    }
  }
  if (action === "jamnutz:export-midi") {
    try {
      exportOkinoriMidi();
      event.source?.postMessage({ type: "jamnutz:export-complete", format: "MIDI" }, event.origin || "*");
    } catch (error) {
      console.error(error);
      event.source?.postMessage({ type: "jamnutz:error", message: "Could not export MIDI." }, event.origin || "*");
    }
  }
  if (action === "jamnutz:export-audio") {
    event.source?.postMessage({ type: "jamnutz:error", message: "Audio export is not wired yet in OKINORI." }, event.origin || "*");
  }
});

function collectOkinoriProject() {
  const synthEngine = window.sequencer.synthEngine;
  return {
    meta: {
      app: "okinori",
      projectName: "Okinori Session",
      savedAt: new Date().toISOString()
    },
    tempo: window.sequencer.tempo,
    currentInstrument: window.sequencer.currentInstrument,
    currentPatternIndex: window.sequencer.currentPatternIndex,
    currentScale: window.keyboard?.currentScale || "major",
    octaveOffsets: { ...window.sequencer.sequencerOctaveOffsets },
    directions: { ...window.sequencer.directions },
    pendulumReverse: { ...window.sequencer.pendulumReverse },
    tracks: JSON.parse(JSON.stringify(window.sequencer.sequencerTracks)),
    patternMemory: JSON.parse(JSON.stringify(window.sequencer.memory.patternMemory)),
    instrumentSettings: JSON.parse(JSON.stringify(synthEngine.instrumentSettings))
  };
}

function applyOkinoriProject(project) {
  if (!project || !window.sequencer) return;
  const synthEngine = window.sequencer.synthEngine;
  window.sequencer.tempo = project.tempo || 120;
  const tempoSlider = document.getElementById("tempo");
  const tempoValue = document.getElementById("tempo-value");
  if (tempoSlider) tempoSlider.value = window.sequencer.tempo;
  if (tempoValue) tempoValue.textContent = String(window.sequencer.tempo);
  if (project.tracks) {
    Object.keys(window.sequencer.sequencerTracks).forEach((key) => {
      if (project.tracks[key]) window.sequencer.sequencerTracks[key] = [...project.tracks[key]];
    });
  }
  if (project.patternMemory) {
    window.sequencer.memory.patternMemory = JSON.parse(JSON.stringify(project.patternMemory));
  }
  if (project.octaveOffsets) window.sequencer.sequencerOctaveOffsets = { ...project.octaveOffsets };
  if (project.directions) window.sequencer.directions = { ...project.directions };
  if (project.pendulumReverse) window.sequencer.pendulumReverse = { ...project.pendulumReverse };
  if (project.instrumentSettings) {
    Object.keys(project.instrumentSettings).forEach((key) => {
      if (synthEngine.instrumentSettings[key]) {
        synthEngine.instrumentSettings[key] = { ...synthEngine.instrumentSettings[key], ...project.instrumentSettings[key] };
      }
    });
  }
  if (project.currentScale && window.keyboard) {
    window.keyboard.currentScale = project.currentScale;
    const scaleButton = document.getElementById("scale-button");
    if (scaleButton) scaleButton.textContent = project.currentScale.charAt(0).toUpperCase() + project.currentScale.slice(1);
  }
  if (project.currentInstrument) {
    synthEngine.setInstrument(project.currentInstrument);
    window.sequencer.setCurrentInstrument(project.currentInstrument);
  }
  if (typeof project.currentPatternIndex === "number") {
    window.sequencer.currentPatternIndex = project.currentPatternIndex;
    document.querySelectorAll('.pattern-button').forEach((btn, idx) => {
      btn.classList.toggle('active', idx === project.currentPatternIndex);
      if (project.patternMemory?.[idx]?.synth) btn.classList.add('saved');
    });
  }
  const adsrControlsElement = document.querySelector(".adsr-controls");
  if (adsrControlsElement && adsrControlsElement.__adsrControlsInstance) {
    adsrControlsElement.__adsrControlsInstance.updateValues();
  }
  window.sequencer.grid.createGrid();
  window.sequencer.updateDirectionButtonStates();
}

function encodeVarLength(value) {
  let buffer = value & 0x7F;
  const bytes = [];
  while ((value >>= 7)) {
    buffer <<= 8;
    buffer |= (value & 0x7F) | 0x80;
  }
  while (true) {
    bytes.push(buffer & 0xFF);
    if (buffer & 0x80) buffer >>= 8;
    else break;
  }
  return bytes;
}

function numberToBytes(value, byteCount) {
  const bytes = [];
  for (let i = byteCount - 1; i >= 0; i--) bytes.push((value >> (i * 8)) & 0xFF);
  return bytes;
}

function pushString(target, value) {
  for (const ch of value) target.push(ch.charCodeAt(0));
}

function midiNoteFromRow(rowIndex, octaveOffset = 0) {
  const base = 84 - rowIndex;
  return Math.max(24, Math.min(108, base + octaveOffset * 12));
}

function instrumentToChannel(instrument) {
  return ({ synth: 0, bass: 1, keys: 2, lead: 3, pad: 4, fx: 5 })[instrument] ?? 0;
}

function exportOkinoriMidi() {
  const ticksPerQuarter = 480;
  const stepsPerBeat = 4;
  const ticksPerStep = ticksPerQuarter / stepsPerBeat;
  const midiEvents = [];
  const instruments = ["synth", "bass", "keys", "lead", "pad", "fx"];

  instruments.forEach((instrument) => {
    const channel = instrumentToChannel(instrument);
    const track = window.sequencer.sequencerTracks[instrument] || [];
    const octaveOffset = window.sequencer.sequencerOctaveOffsets[instrument] || 0;
    for (let step = 0; step < 32; step++) {
      for (let row = 0; row < 12; row++) {
        const cellIndex = row * 32 + step;
        const stepValue = track[cellIndex];
        if (!stepValue) continue;
        const midiNote = midiNoteFromRow(row, octaveOffset + (stepValue - 2));
        const startTick = step * ticksPerStep;
        const endTick = startTick + ticksPerStep;
        midiEvents.push({ tick: startTick, channel, type: "on", note: midiNote, velocity: 96 });
        midiEvents.push({ tick: endTick, channel, type: "off", note: midiNote, velocity: 0 });
      }
    }
  });

  midiEvents.sort((a, b) => a.tick - b.tick || (a.type === "off" ? -1 : 1));

  const bytes = [];
  pushString(bytes, "MThd");
  bytes.push(...numberToBytes(6, 4));
  bytes.push(...numberToBytes(0, 2));
  bytes.push(...numberToBytes(1, 2));
  bytes.push(...numberToBytes(ticksPerQuarter, 2));

  const trackBytes = [];
  const tempo = Math.max(40, Math.min(260, Number(window.sequencer.tempo) || 120));
  const microsecondsPerQuarter = Math.round(60000000 / tempo);
  trackBytes.push(0x00, 0xFF, 0x51, 0x03, ...numberToBytes(microsecondsPerQuarter, 3));
  trackBytes.push(0x00, 0xFF, 0x03, 0x07, ...Array.from("OKINORI").map((c) => c.charCodeAt(0)));

  let lastTick = 0;
  for (const event of midiEvents) {
    const delta = event.tick - lastTick;
    trackBytes.push(...encodeVarLength(delta));
    trackBytes.push((event.type === "on" ? 0x90 : 0x80) | event.channel, event.note, event.velocity);
    lastTick = event.tick;
  }
  trackBytes.push(0x00, 0xFF, 0x2F, 0x00);

  pushString(bytes, "MTrk");
  bytes.push(...numberToBytes(trackBytes.length, 4), ...trackBytes);

  const blob = new Blob([new Uint8Array(bytes)], { type: "audio/midi" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = `okinori-${new Date().toISOString().slice(0, 19).replace(/[T:]/g, "-")}.mid`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

        startVal = parseFloat(slider.value || defaultVal);

        const move = (ev) => {
          const t = ev.touches?.[0];
          if (!t) return;
          const rect = track.getBoundingClientRect();
          const x = Math.max(0, Math.min(rect.width, t.clientX - rect.left));
          const ratio = x / rect.width;
          let value = min + ratio * (max - min);
          value = Math.round(value);
          value = Math.min(max, Math.max(min, value));

          slider.value = value;
          updateSlider(value);
        };

        const up = () => {
          window.removeEventListener('touchmove', move);
          window.removeEventListener('touchend', up);
          window.removeEventListener('touchcancel', up);
        };

        window.addEventListener('touchmove', move, { passive: false });
        window.addEventListener('touchend', up);
        window.addEventListener('touchcancel', up);
      }, { passive: false });
    });

    // Module switching buttons
    const moduleButtons = document.querySelectorAll('.okn-adsr-mini-grid .mini-btn');
    const adsrPanel = document.querySelector('[data-module-panel="adsr"]');
    const trkContPanel = document.querySelector('[data-module-panel="trkcont"]');

    moduleButtons.forEach((btn) => {
      const btnText = btn.textContent.trim();

      // Only add handlers for GROOVE button to show TRK CONT
      if (btnText === 'GROOVE') {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          moduleButtons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');

          if (adsrPanel) adsrPanel.style.display = 'none';
          if (trkContPanel) trkContPanel.style.display = 'flex';
        });
      } else if (btnText === 'ADSR') {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          moduleButtons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');

          if (adsrPanel) adsrPanel.style.display = 'grid';
          if (trkContPanel) trkContPanel.style.display = 'none';
        });
      }
    });

    // Pattern switching buttons
    const patternButtons = document.querySelectorAll('.okn-pattern-grid .pattern-btn');
    let currentPattern = 1;

    patternButtons.forEach((btn) => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const patternNum = parseInt(btn.dataset.pattern);

        // Update active state
        patternButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        currentPattern = patternNum;

        // If pattern switching logic exists in sequencer, call it here
        if (sequencer?.memory?.loadPattern) {
          sequencer.memory.loadPattern(patternNum - 1);
        }
      });
    });

    document.getElementById("clear-all-button").addEventListener("click", () => {
      sequencer.sequencerTracks.synth = Array(384).fill(0);
      sequencer.sequencerTracks.bass = Array(384).fill(0);
      sequencer.sequencerTracks.keys = Array(384).fill(0);
      sequencer.sequencerTracks.lead = Array(384).fill(0);
      sequencer.sequencerTracks.pad = Array(384).fill(0);
      sequencer.sequencerTracks.fx = Array(384).fill(0);
      if (sequencer.sequencerRunning) {
        sequencer.stopSequencer();
      }
      sequencer.grid.createGrid();
      sequencer.memory.savePatternWithUI(sequencer.currentPatternIndex);
    });
  });
})();
</script>
